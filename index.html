        ${!isManual ? `
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace">Aplicar a todos:</span>
          <button class="btn btn-ghost btn-sm" onclick="setAllMode('both')">Preço + Stock</button>
          <button class="btn btn-ghost btn-sm" onclick="setAllMode('price')">Só Preço</button>
          <button class="btn btn-ghost btn-sm" onclick="setAllMode('stock')">Só Stock</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleAllFound(false)" style="color:var(--text3)">Limpar</button>
        </div>` : ''}
      </div>
      <div class="table-wrap" style="max-height:420px;overflow-y:auto">
        <table><thead><tr>
          <th style="width:36px"><input type="checkbox" id="chk-all-found" onchange="toggleAllFound(this.checked)" checked></th>
          <th>Produto Shopify</th><th>SKU</th>
          ${isManual ? '<th>Custo Fornecedor</th>' : ''}
          <th>Preço Venda ${isManual ? '(atual → edita se necessário)' : 'Atual → Novo'}</th>
          <th>Stock Atual → Novo</th><th>Via</th>
          <th style="text-align:center;width:52px">💶</th><th style="text-align:center;width:52px">📦</th>
        </tr></thead>
        <tbody id="found-tbody">
          ${found.map((p,i)=>{
            const priceChanged=parseFloat(p.currentPrice||0).toFixed(2)!==p.finalPrice.toFixed(2);
            const stockChanged=p.currentStock!==p.stockVal;
            const roundingDiff = (!isManual && p.rawPrice!==p.finalPrice) ? `<span style="font-size:10px;color:var(--text3);margin-left:4px">(raw €${p.rawPrice.toFixed(2)})</span>` : '';
            const cc = p.costChange;
            const costCell = isManual ? `<td style="font-size:12px;white-space:nowrap">
              ${cc && cc.direcao!=='novo' ? `
                <span style="font-size:14px;vertical-align:middle">${cc.direcao==='subiu'?'🔴':'🟢'}</span>
                <span class="mono" style="color:var(--text2);font-size:11px"> €${cc.custoAnterior.toFixed(2)} → </span>
                <span class="mono" style="font-weight:600;color:${cc.direcao==='subiu'?'var(--red)':'var(--green)'}">€${cc.custoNovo.toFixed(2)}</span>
                <span style="font-size:10px;color:${cc.direcao==='subiu'?'var(--red)':'var(--green)'};margin-left:3px">(${cc.direcao==='subiu'?'+':''}${cc.variacaoPercentagem.toFixed(1)}%)</span>`
              : cc && cc.direcao==='novo' ? `<span style="color:var(--text3);font-size:11px">🆕 €${cc.custoNovo.toFixed(2)} (1.º upload)</span>`
              : `<span style="color:var(--text3);font-size:11px">⚪ €${p.costRaw.toFixed(2)} (igual)</span>`}
            </td>` : '';
            return `<tr id="found-row-${i}">
              <td><input type="checkbox" class="chk-found" data-idx="${i}" checked onchange="updateFoundRow(${i},this.checked)"></td>
              <td style="font-weight:600;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.shopifyTitle}">${p.shopifyTitle}</td>
              <td class="mono" style="font-size:11px;color:var(--text2)">${p.sku||'—'}</td>
              ${costCell}
              <td style="font-size:12px;white-space:nowrap">
                <span class="mono" style="color:var(--text2)">€${parseFloat(p.currentPrice||0).toFixed(2)}</span>
                ${priceChanged
                  ? `<span style="color:var(--text3)"> → </span><span class="price-display-${i} mono" style="color:var(--green);font-weight:600">€${p.finalPrice.toFixed(2)}</span>${roundingDiff}<button onclick="editPrice(${i})" style="background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--text3);font-size:13px;vertical-align:middle">✏</button>`
                  : `<span class="price-display-${i} mono" style="display:none">€${p.finalPrice.toFixed(2)}</span><button onclick="editPrice(${i})" style="background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--text3);font-size:13px;vertical-align:middle" title="Editar preço">✏</button>`}
              </td>
              <td class="mono" style="font-size:12px;white-space:nowrap">
                <span style="color:var(--text2)">${p.currentStock??'?'}</span>
                ${stockChanged?`<span style="color:var(--text3)"> → </span><strong style="color:var(--blue)">${p.stockVal}</strong>`:'<span style="color:var(--text3);font-size:11px"> (igual)</span>'}
              </td>
              <td><span class="badge ${p.matchedBy==='SKU'?'badge-blue':'badge-orange'}" style="font-size:10px">${p.matchedBy}</span></td>
              <td style="text-align:center"><input type="checkbox" class="chk-price" data-idx="${i}" ${priceChanged?'checked':''} ${!priceChanged?'disabled':''} onchange="state.analysisResult.found[${i}].applyPrice=this.checked;updateApplySummary()"></td>
              <td style="text-align:center"><input type="checkbox" class="chk-stock" data-idx="${i}" ${stockChanged?'checked':''} ${!stockChanged?'disabled':''} onchange="state.analysisResult.found[${i}].applyStock=this.checked;updateApplySummary()"></td>
            </tr>`;
          }).join('')}
        </tbody></table>
      </div>
    </div>`:''
    }

    ${isNew.length>0?`
    <div class="review-section rs-new" style="margin-bottom:16px">
      <div class="review-section-title">🆕 ${isNew.length} Produto(s) Novo(s) — serão adicionados aos Alertas</div>
      <div class="table-wrap" style="max-height:200px;overflow-y:auto">
        <table><thead><tr><th>Nome</th><th>SKU</th><th>Preço Final</th><th>Stock</th></tr></thead>
        <tbody>${isNew.map(p=>`<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</td><td class="mono">${p.sku||'—'}</td><td class="mono">€${p.finalPrice.toFixed(2)}</td><td class="mono">${p.stockVal}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`:''
    }

    ${notFound.length>0?`
    <div class="review-section rs-missing" style="margin-bottom:16px">
      <div class="review-section-title">❓ ${notFound.length} Não Encontrados</div>
      <div class="table-wrap" style="max-height:200px;overflow-y:auto">
        <table><thead><tr><th>Nome</th><th>SKU</th><th>Barcode</th></tr></thead>
        <tbody>${notFound.map(p=>`<tr><td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</td><td class="mono">${p.sku||'—'}</td><td class="mono">${p.barcode||'—'}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`:''
    }

    <div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;bottom:0;z-index:10">
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px;color:var(--text)" id="apply-summary">A calcular...</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${isManual ? 'Modo Manual — preços não alterados. Stock e tags serão aplicados.' : 'Tags de fornecedor e saúde serão aplicadas automaticamente'}</div>
      </div>
      <button class="btn btn-ghost" onclick="resetUpload()">↩ Recomeçar</button>
      <button class="btn btn-primary" onclick="applyChanges()">${isManual ? '✓ Aplicar Stock + Registar Alertas' : '✓ Aplicar no Shopify'}</button>
    </div>`;
  updateApplySummary();
}

function setAllMode(mode) {
  document.querySelectorAll('.chk-found').forEach(c=>{c.checked=true;});
  document.querySelectorAll('.chk-price').forEach(c=>{ if(!c.disabled) c.checked=(mode==='both'||mode==='price'); });
  document.querySelectorAll('.chk-stock').forEach(c=>{ if(!c.disabled) c.checked=(mode==='both'||mode==='stock'); });
  const chkAll=document.getElementById('chk-all-found'); if(chkAll) chkAll.checked=true;
  if(state.analysisResult) state.analysisResult.found.forEach(p=>{ p._selected=true; p.applyPrice=(mode==='both'||mode==='price'); p.applyStock=(mode==='both'||mode==='stock'); });
  updateApplySummary();
}

function editPrice(idx) {
  const p=state.analysisResult?.found[idx]; if(!p) return;
  const displayEl=document.querySelector(`.price-display-${idx}`); if(!displayEl) return;
  const parent=displayEl.parentElement;
  const editBtn=parent.querySelector('button');
  displayEl.style.display='none'; if(editBtn) editBtn.style.display='none';
  const input=document.createElement('input');
  input.type='number'; input.step='0.01'; input.min='0'; input.value=p.finalPrice.toFixed(2);
  input.style.cssText='width:80px;padding:3px 6px;font-family:"DM Mono",monospace;font-size:12px;border:1px solid var(--blue);border-radius:5px;color:var(--text);background:var(--surface);outline:none;';
  const confirmBtn=document.createElement('button'); confirmBtn.textContent='✓'; confirmBtn.style.cssText='background:var(--green);color:white;border:none;border-radius:5px;padding:3px 7px;cursor:pointer;font-size:12px;margin-left:4px;';
  const cancelBtn=document.createElement('button'); cancelBtn.textContent='✕'; cancelBtn.style.cssText='background:var(--panel);color:var(--text2);border:1px solid var(--border);border-radius:5px;padding:3px 7px;cursor:pointer;font-size:12px;margin-left:3px;';
  const save=()=>{ const newVal=parseFloat(input.value); if(isNaN(newVal)||newVal<=0){toast('Preço inválido','error');return;} p.finalPrice=newVal; p.applyPrice=true; displayEl.textContent='€'+newVal.toFixed(2); displayEl.style.display=''; if(editBtn) editBtn.style.display=''; input.remove(); confirmBtn.remove(); cancelBtn.remove(); const priceChk=document.querySelector(`.chk-price[data-idx="${idx}"]`); if(priceChk){priceChk.disabled=false;priceChk.checked=true;} updateApplySummary(); toast('Preço atualizado','success'); };
  const cancel=()=>{ displayEl.style.display=''; if(editBtn) editBtn.style.display=''; input.remove(); confirmBtn.remove(); cancelBtn.remove(); };
  confirmBtn.onclick=save; cancelBtn.onclick=cancel; input.onkeydown=(e)=>{if(e.key==='Enter')save();if(e.key==='Escape')cancel();};
  parent.appendChild(input); parent.appendChild(confirmBtn); parent.appendChild(cancelBtn); input.focus(); input.select();
}

function toggleAllFound(checked) {
  document.querySelectorAll('.chk-found').forEach(c=>{c.checked=checked;});
  document.querySelectorAll('.chk-price').forEach(c=>{if(!c.disabled)c.checked=checked;});
  document.querySelectorAll('.chk-stock').forEach(c=>{if(!c.disabled)c.checked=checked;});
  const chkAll=document.getElementById('chk-all-found'); if(chkAll) chkAll.checked=checked;
  if(state.analysisResult) state.analysisResult.found.forEach(p=>{p._selected=checked;p.applyPrice=checked;p.applyStock=checked;});
  updateApplySummary();
}

function updateFoundRow(idx, checked) {
  const priceChk=document.querySelector(`.chk-price[data-idx="${idx}"]`);
  const stockChk=document.querySelector(`.chk-stock[data-idx="${idx}"]`);
  if(priceChk&&!priceChk.disabled) priceChk.checked=checked;
  if(stockChk&&!stockChk.disabled) stockChk.checked=checked;
  if(state.analysisResult?.found[idx]){ state.analysisResult.found[idx]._selected=checked; state.analysisResult.found[idx].applyPrice=checked; state.analysisResult.found[idx].applyStock=checked; }
  updateApplySummary();
}

function updateApplySummary() {
  const el=document.getElementById('apply-summary'); if(!el||!state.analysisResult) return;
  const stockUpdates=state.analysisResult.found.filter(p=>p._selected!==false&&p.applyStock).length;
  if (state.analysisResult.isManual) {
    const costChanges=state.analysisResult.costChanges?.length||0;
    el.textContent=`${stockUpdates} stock(s) a atualizar${costChanges>0?' · '+costChanges+' variação(ões) de custo a registar':''}`;
  } else {
    const selected=state.analysisResult.found.filter(p=>p._selected!==false).length;
    const priceUpdates=state.analysisResult.found.filter(p=>p._selected!==false&&p.applyPrice).length;
    el.textContent=`${selected} produto(s) — ${priceUpdates} preço(s) + ${stockUpdates} stock(s)`;
  }
}

async function applyChanges() {
  if(!state.analysisResult) return;
  const {found, isNew, knownSkus, knownBarcodes, uploadTotal} = state.analysisResult;
  const supp = state.suppliers.find(s=>s.id===state.uploadSuppId);
  const isManualMode = state.analysisResult?.isManual;
  const toUpdate = found.filter(p=>p._selected!==false&&(p.applyPrice||p.applyStock));
  const hasCostChanges = isManualMode && (state.analysisResult?.costChanges?.length > 0);
  if(!toUpdate.length&&!isNew.length&&!hasCostChanges){ toast('Nada selecionado para aplicar','error'); return; }

  document.getElementById('step-analysis').style.display='none';
  document.getElementById('step-mapping').style.display='none';
  document.getElementById('step-duplicates').style.display='none';
  document.getElementById('step-progress').style.display='block';

  const total = toUpdate.length;
  const setUI = (icon, title, sub, pct, current) => {
    const setT=(id,v)=>{ const e=document.getElementById(id); if(e&&v!==undefined) e.textContent=v; };
    const setH=(id,v)=>{ const e=document.getElementById(id); if(e&&v!==undefined) e.innerHTML=v; };
    setH('prog-icon', icon||'⚡');
    setT('prog-title', title||'');
    setT('prog-sub', sub||'');
    setT('prog-current', current||'');
    if(pct!==undefined){
      const f=document.getElementById('progress-fill'); if(f) f.style.width=pct+'%';
      setT('prog-pct', pct+'%');
    }
  };
  const setCount=(i)=>{ const e=document.getElementById('prog-count'); if(e) e.textContent=`${i} / ${total}`; };
  const addError=(msg)=>{
    const el=document.getElementById('prog-errors');
    if(el){ el.style.display='block'; el.innerHTML+=`<div>❌ ${msg}</div>`; }
  };

  setUI('⚡', `A atualizar ${total} produto(s)...`, 'Não feches esta janela', 0, '');
  setCount(0);

  let locationId;
  try{ locationId=await getLocationId(); } catch(e){ addError('Sem locationId: '+e.message); }

  let updated=0, errors=0, priceUpdated=0, stockUpdated=0, tagsApplied=0;

  for(let i=0;i<toUpdate.length;i++){
    const p=toUpdate[i];
    const shortTitle = p.shopifyTitle.length>45 ? p.shopifyTitle.substring(0,45)+'…' : p.shopifyTitle;
    setUI(undefined, undefined, undefined, Math.round((i/total)*85), shortTitle);
    setCount(i+1);
    try {
      if(p.applyPrice) { await updateVariantPrice(p.shopifyProduct.id, p.shopifyVariant.id, p.finalPrice.toFixed(2)); priceUpdated++; }
      if(p.applyStock&&locationId&&p.shopifyVariant.inventoryItemId) {
        try {
          await shopifyGQL(`mutation($id:ID!,$input:InventoryItemInput!){inventoryItemUpdate(id:$id,input:$input){inventoryItem{id tracked}userErrors{message}}}`,{id:p.shopifyVariant.inventoryItemId,input:{tracked:true}});
          await shopifyGQL(`mutation($inventoryItemId:ID!,$locationId:ID!){inventoryActivate(inventoryItemId:$inventoryItemId,locationId:$locationId){inventoryLevel{id}userErrors{message}}}`,{inventoryItemId:p.shopifyVariant.inventoryItemId,locationId});
          await updateVariantStock(p.shopifyVariant.inventoryItemId,locationId,p.stockVal);
          stockUpdated++;
        } catch(se){ addError(`Stock — ${shortTitle}: ${se.message}`); }
      }
      const existingTags = p.shopifyProduct.tags||[];
      await applyTagsToProduct(p.shopifyProduct.id, existingTags, state.uploadSuppId, 'cat:atualizado');
      p.shopifyProduct.tags = buildTagUpdate(existingTags, [`sup:${state.uploadSuppId}`, 'cat:atualizado', `last-seen:${YYYYMM()}`]);
      tagsApplied++; updated++;
    } catch(e){ addError(`${shortTitle}: ${e.message}`); errors++; }
    await sleep(320);
  }

  // New product alerts
  isNew.forEach(p=>{
    state.alerts.push({ id:'alert_'+Date.now()+Math.random(), type:'new_product', title:'Novo produto detetado', desc:`${p.name}${p.sku?' ('+p.sku+')':''} — ${p.suppName} — €${p.finalPrice.toFixed(2)}`, sku:p.sku, barcode:p.barcode, name:p.name, price:p.finalPrice, stock:p.stockVal, suppId:p.suppId, date:new Date().toISOString(), dismissed:false });
  });

  // Modo manual: guardar alertas de custo e atualizar histórico de custos
  const costChangesRegistered = [];
  if (isManualMode) {
    const costChanges = state.analysisResult?.costChanges || [];
    costChanges.forEach(cc => {
      state.costAlerts.push({
        id: 'ca_'+Date.now()+Math.random(),
        suppId: state.uploadSuppId, suppName: supp.name,
        produto: cc.name, sku: cc.sku, barcode: cc.barcode,
        custoAnterior: cc.custoAnterior, custoNovo: cc.custoNovo,
        variacaoEuros: cc.variacaoEuros, variacaoPercentagem: cc.variacaoPercentagem,
        direcao: cc.direcao, date: new Date().toISOString(), dismissed: false,
      });
      costChangesRegistered.push(cc);
    });
    // Atualizar baseline de custo para TODOS os produtos processados
    state.analysisResult?.found?.forEach(p => {
      if (p.histKey) state.costHistory[p.histKey] = { custo: p.costRaw, data: new Date().toISOString() };
    });
  }

  state.uploadHistory.unshift({ id:'upl_'+Date.now(), supplierId:state.uploadSuppId, supplierName:supp.name, date:new Date().toISOString(), total:uploadTotal, updated, errors, newProducts:isNew.length });
  state.suppliers = state.suppliers.map(s=>s.id===state.uploadSuppId?{...s,lastUpload:new Date().toISOString()}:s);
  save();

  try {
    setUI('🔍', 'A verificar saúde do catálogo...', '', 90, `A comparar produtos ${supp.name}...`);
    if(state.shopifyProducts.length>0) {
      await runPostUploadHealthCheck(state.uploadSuppId, { skus: knownSkus, barcodes: knownBarcodes, total: uploadTotal });
    }
  } catch(e) { console.warn('Health check falhou:', e.message); }

  // SHOW SUCCESS STATE
  const f=document.getElementById('progress-fill'); if(f) f.style.width='100%';
  const pct=document.getElementById('prog-pct'); if(pct) pct.textContent='100%';
  document.getElementById('prog-icon').style.display='none';
  document.getElementById('prog-title').style.display='none';
  document.getElementById('prog-sub').style.display='none';
  document.getElementById('prog-count').style.display='none';
  document.getElementById('prog-current').style.display='none';

  const sc = document.getElementById('prog-success');
  if(sc) {
    sc.style.display='block';
    document.getElementById('prog-summary-cards').innerHTML = [
      {n:updated, lbl:'Atualizados', color:'var(--green)'},
      {n:priceUpdated, lbl:'Preços', color:'var(--blue)'},
      {n:stockUpdated, lbl:'Stocks', color:'var(--blue)'},
      {n:tagsApplied, lbl:'Tags', color:'var(--purple)'},
      ...(isNew.length>0?[{n:isNew.length, lbl:'Novos alertas', color:'var(--orange)'}]:[]),
      ...(costChangesRegistered.length>0?[{n:costChangesRegistered.length, lbl:'Alertas custo', color:'var(--purple)'}]:[]),
      ...(errors>0?[{n:errors, lbl:'Erros', color:'var(--red)'}]:[]),
    ].map(x=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:${x.color}">${x.n}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">${x.lbl}</div>
    </div>`).join('');
  }

  toast(`Upload concluído: ${updated} produto(s) atualizados`,'success');
  save(); updateBadges();
}

function resetUpload() {
  state.parsedRows=[]; state.colMap={}; state.analysisResult=null; state.uploadSuppId=null;
  upload();
}

// ═══════════════════════════════════════════
// ALERTS
// ═══════════════════════════════════════════
function alerts() {
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-ghost btn-sm" onclick="dismissAllAlerts()">Dispensar todos</button>`;
  const active = state.alerts.filter(a=>!a.dismissed);
  const byType = (type) => active.filter(a=>a.type===type);
  document.getElementById('content').innerHTML=`
    <div class="tabs">
      <button class="tab active" onclick="filterAlerts('all',this)">Todos (${active.length})</button>
      <button class="tab" onclick="filterAlerts('new_product',this)">Novos Produtos (${byType('new_product').length})</button>
      <button class="tab" onclick="filterAlerts('no_update',this)">Sem Update (${byType('no_update').length})</button>
      <button class="tab" onclick="filterAlerts('zero_stock',this)">Stock Zerado (${byType('zero_stock').length})</button>
      <button class="tab" onclick="filterAlerts('no_origin',this)">Sem Origem (${byType('no_origin').length})</button>
    </div>
    <div class="alert-list" id="alert-list">${renderAlertList(active)}</div>`;
}

const alertIcon = { new_product:'🆕', no_update:'⚠', zero_stock:'🔴', no_origin:'🔍' };

function renderAlertList(list) {
  if(!list.length) return `<div class="empty-state"><div class="empty-icon">🔔</div><p>Sem alertas ativos</p></div>`;
  return list.map(a=>`
    <div class="alert-card ${a.type}" id="alert-${a.id}">
      <div class="alert-icon">${alertIcon[a.type]||'ℹ'}</div>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
        <div class="alert-desc" style="margin-top:3px;color:var(--text3)">${new Date(a.date).toLocaleDateString('pt-PT')}</div>
        <div class="alert-actions">
          ${a.type==='new_product'?`<button class="btn btn-success btn-sm" onclick="suggestCreate('${a.id}')">+ Criar no Shopify</button>`:''}
          ${a.type==='no_origin'?`<button class="btn btn-purple btn-sm" onclick="navigate('health')">Ver no Catálogo</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="dismissAlert('${a.id}')">Dispensar</button>
        </div>
      </div>
    </div>`).join('');
}

function filterAlerts(type, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.getElementById('alert-list').innerHTML = renderAlertList(state.alerts.filter(a=>!a.dismissed&&(type==='all'||a.type===type)));
}

function dismissAlert(id) { state.alerts=state.alerts.map(a=>a.id===id?{...a,dismissed:true}:a); save(); document.getElementById('alert-'+id)?.remove(); updateBadges(); }
function dismissAllAlerts() { state.alerts=state.alerts.map(a=>({...a,dismissed:true})); save(); render(); }

function suggestCreate(alertId) {
  const a = state.alerts.find(x=>x.id===alertId); if(!a) return;
  const supp = state.suppliers.find(s=>s.id===a.suppId);
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">🆕 Criar Produto no Shopify</div>
    <div class="form-grid">
      <div class="form-group"><label>Título</label><input type="text" id="np-title" value="${a.name}"></div>
      <div class="form-row">
        <div class="form-group"><label>SKU</label><input type="text" id="np-sku" value="${a.sku||''}"></div>
        <div class="form-group"><label>Barcode</label><input type="text" id="np-barcode" value="${a.barcode||''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Preço (€)</label><input type="number" id="np-price" value="${a.price||''}" step="0.01"></div>
        <div class="form-group"><label>Stock Inicial</label><input type="number" id="np-stock" value="${a.stock||0}"></div>
      </div>
      <div class="form-group"><label>Vendor</label><input type="text" id="np-vendor" value="${supp?.name||''}"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createFromAlert('${alertId}')">Criar no Shopify</button>
    </div>`;
  openModal();
}

async function createFromAlert(alertId) {
  const title=document.getElementById('np-title')?.value.trim();
  const sku=document.getElementById('np-sku')?.value.trim();
  const barcode=document.getElementById('np-barcode')?.value.trim();
  const price=document.getElementById('np-price')?.value;
  const vendor=document.getElementById('np-vendor')?.value.trim();
  if(!title){toast('Título obrigatório','error');return;}
  toast('A criar produto...','info');
  try{
    // Step 1: create product without variants (API 2026-01 removed variants from ProductInput)
    const data=await shopifyGQL(`mutation($input:ProductInput!){productCreate(input:$input){product{id variants(first:1){edges{node{id inventoryItem{id}}}}}userErrors{message}}}`,{input:{title,vendor,status:'DRAFT'}});
    if(data.productCreate.userErrors.length){toast(data.productCreate.userErrors[0].message,'error');return;}
    const product=data.productCreate.product;
    const variantId=product?.variants?.edges[0]?.node?.id;
    const invId=product?.variants?.edges[0]?.node?.inventoryItem?.id;
    // Step 2: update default variant with price and barcode
    if(variantId){
      const variantInput={id:variantId,price:String(price)};
      if(barcode) variantInput.barcode=barcode;
      const vData=await shopifyGQL(`mutation($productId:ID!,$variants:[ProductVariantsBulkInput!]!){productVariantsBulkUpdate(productId:$productId,variants:$variants){userErrors{message}}}`,{productId:product.id,variants:[variantInput]});
      if(vData.productVariantsBulkUpdate.userErrors.length){toast(vData.productVariantsBulkUpdate.userErrors[0].message,'error');return;}
    }
    if(invId&&sku) await updateVariantSKU(invId,sku);
    // Apply tags immediately
    const a=state.alerts.find(x=>x.id===alertId);
    if(a?.suppId) await updateProductTags(product.id, [`sup:${a.suppId}`, 'cat:atualizado', `last-seen:${YYYYMM()}`]);
    dismissAlert(alertId); closeModal();
    toast('Produto criado com tags de fornecedor ✓','success');
    fetchShopifyProducts();
  }catch(e){toast('Erro: '+e.message,'error');}
}

function matching() {
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="runMatching()">▶ Executar Matching</button>`;
  document.getElementById('content').innerHTML=`
    <div class="card" style="margin-bottom:16px;background:var(--blue-bg);border-color:#BFDBFE"><p style="font-size:13px;color:var(--blue)">🔗 Compara produtos não encontrados por SKU/barcode com produtos do Shopify por semelhança de nome.</p></div>
    ${state.shopifyProducts.length===0?`<div class="card" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">🔗</div><p style="color:var(--text2)">Sincroniza os produtos do Shopify primeiro.</p><button class="btn btn-primary" style="margin-top:16px" onclick="fetchShopifyProducts().then(render)">Sincronizar Shopify</button></div>`:`
    <div class="table-wrap">
      <div class="table-header"><span style="font-family:'Syne',sans-serif;font-weight:700">${state.matches.filter(m=>!m.dismissed).length} sugestão(ões)</span></div>
      <table><thead><tr><th>Produto Shopify</th><th>SKU Atual</th><th>Nome no Fornecedor</th><th>SKU Sugerido</th><th>Score</th><th>Ação</th></tr></thead>
      <tbody>${state.matches.filter(m=>!m.dismissed).length===0?`<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">🔗</div><p>Clica em "Executar Matching" para analisar</p></div></td></tr>`:
        state.matches.filter(m=>!m.dismissed).map(m=>`<tr id="match-${m.id}">
          <td style="font-weight:600">${m.shopifyTitle}</td>
          <td class="mono">${m.shopifySku||'—'}</td>
          <td style="color:var(--blue)">${m.supplierName}</td>
          <td class="mono">${m.supplierSku}</td>
          <td><span class="badge ${m.score>85?'badge-green':m.score>60?'badge-yellow':'badge-orange'}">${m.score}%</span></td>
          <td><div style="display:flex;gap:4px">
            <button class="btn btn-success btn-sm" onclick="acceptMatch('${m.id}')">✓ Aceitar</button>
            <button class="btn btn-ghost btn-sm" onclick="rejectMatch('${m.id}')">✕</button>
          </div></td>
        </tr>`).join('')}
      </tbody></table>
    </div>`}`;
}

function similarity(a,b) {
  a=a.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
  b=b.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
  if(a===b) return 100;
  const wa=new Set(a.split(/\s+/).filter(w=>w.length>2));
  const wb=new Set(b.split(/\s+/).filter(w=>w.length>2));
  let common=0; wa.forEach(w=>{if(wb.has(w))common++;});
  return Math.round((common/Math.max(wa.size,wb.size,1))*100);
}

async function runMatching() {
  if(!state.shopifyProducts.length){toast('Sincroniza o Shopify primeiro','error');return;}
  state.matches=[];
  const newProds=state.alerts.filter(a=>a.type==='new_product'&&!a.dismissed);
  newProds.forEach(np=>{
    if(!np.name) return;
    let best=null, bestScore=0;
    state.shopifyProducts.forEach(sp=>{ const score=similarity(np.name,sp.title); if(score>bestScore&&score>=50){bestScore=score;best=sp;} });
    if(best&&!state.matches.some(m=>m.shopifyId===best.id&&m.supplierSku===np.sku)){
      state.matches.push({ id:'match_'+Date.now()+Math.random(), shopifyId:best.id, shopifyTitle:best.title, shopifySku:best.variants[0]?.sku, shopifyVariantId:best.variants[0]?.id, shopifyInventoryItemId:best.variants[0]?.inventoryItemId, supplierName:np.name, supplierSku:np.sku, supplierBarcode:np.barcode, score:bestScore, alertId:np.id, dismissed:false });
    }
  });
  save(); toast(`${state.matches.length} sugestão(ões) encontrada(s)`,'success'); render();
}

async function acceptMatch(id) {
  const m=state.matches.find(x=>x.id===id); if(!m) return;
  try{
    if(m.shopifyInventoryItemId&&m.supplierSku) await updateVariantSKU(m.shopifyInventoryItemId,m.supplierSku);
    if(m.alertId) dismissAlert(m.alertId);
    state.matches=state.matches.map(x=>x.id===id?{...x,dismissed:true}:x);
    save(); document.getElementById('match-'+id)?.remove(); toast('SKU atualizado ✓','success');
  }catch(e){toast('Erro: '+e.message,'error');}
}

function rejectMatch(id) { state.matches=state.matches.map(m=>m.id===id?{...m,dismissed:true}:m); save(); document.getElementById('match-'+id)?.remove(); }

let cState = { rows:[], colMap:{}, products:[], variantGroups:[], step:'upload' };

function create() {
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('content').innerHTML=`

          <div class="up-icon">📦</div><p><strong>Clica para selecionar</strong> ou arrasta aqui</p>

function crHandleDrop(e) { e.preventDefault(); document.querySelector('.upload-zone')?.classList.remove('drag'); crHandleFile(e.dataTransfer.files[0]); }

function crHandleFile(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:'array',raw:false,cellText:true,cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    Object.keys(ws).forEach(addr=>{ if(addr[0]==='!') return; const cell=ws[addr]; if(cell.t==='n'&&cell.w) cell.v=cell.w.replace(/\./g,'').replace(/,/g,'.')||cell.v; });
    const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
    if(!rows.length){toast('Ficheiro sem dados','error');return;}
    cState.rows=rows; crShowColMapper(rows);
  };
  reader.readAsArrayBuffer(file);
  document.getElementById('cr-file-info').style.display='block';
  document.getElementById('cr-file-info').innerHTML=`<div style="display:flex;align-items:center;gap:10px;background:var(--panel);padding:9px 12px;border-radius:8px;border:1px solid var(--border)"><span>📄</span><span style="font-weight:600">${file.name}</span><span style="color:var(--text2);font-size:12px">${(file.size/1024).toFixed(0)} KB</span></div>`;
}

function crShowColMapper(rows) {
  const headers=Object.keys(rows[0]);
  const detect=(hints)=>headers.find(h=>hints.some(hint=>h.toLowerCase().includes(hint.toLowerCase())))||'';
  cState.colMap={ name:detect(['Articulo','Nombre','Name','Title']), sku:detect(['Part Number','SKU','Referencia']), barcode:detect(['Codigo 5','EAN','Barcode']), price:detect(['PVP','Precio','Price','Importe']), stock:detect(['Stock','Unidades']), image:detect(['Imagen','Image','URL']), brand:detect(['Fabricante','Marca','Brand']), category:detect(['Familia','Category','Categoria']) };
  const sel=(key,label)=>`<div class="form-group"><label>${label}</label><select id="crcol-${key}" onchange="cState.colMap['${key}']=this.value"><option value="">— Não usar —</option>${headers.map(h=>`<option value="${h}" ${cState.colMap[key]===h?'selected':''}>${h}</option>`).join('')}</select></div>`;
  document.getElementById('cr-col-mapper').innerHTML=`<div class="col-mapper">${sel('name','Nome / Artigo *')}${sel('sku','SKU / Part Number')}${sel('barcode','Barcode / EAN')}${sel('price','Preço')}${sel('stock','Stock')}${sel('image','URL Imagem')}${sel('brand','Fabricante / Marca')}${sel('category','Categoria')}</div>`;
  document.getElementById('cr-step-mapping').style.display='block';
}

async function crRunReview() {
  ['name','sku','barcode','price','stock','image','brand','category'].forEach(k=>{ const el=document.getElementById('crcol-'+k); if(el) cState.colMap[k]=el.value; });
  if(!cState.colMap.name){toast('Coluna de nome obrigatória','error');return;}
  const btn=document.querySelector('#cr-step-mapping .btn-primary'); btn.textContent='A traduzir...'; btn.disabled=true;
  const products=cState.rows.map((row,i)=>{
    const nameES=(row[cState.colMap.name]||'').trim();
    const price=parseFloat((row[cState.colMap.price]||'0').replace(',','.'))||0;
    return { _idx:i, nameES, namePT:'', sku:(row[cState.colMap.sku]||'').trim(), barcode:(row[cState.colMap.barcode]||'').trim(), price:price.toFixed(2), stock:parseInt((row[cState.colMap.stock]||'0').replace(/[^0-9]/g,''))||0, imageUrl:(row[cState.colMap.image]||'').trim(), brand:(row[cState.colMap.brand]||'').trim(), category:(row[cState.colMap.category]||'').trim(), selected:true, variantGroup:null };
  }).filter(p=>p.nameES);
  const BATCH=20;
  for(let i=0;i<products.length;i+=BATCH){
    const batch=products.slice(i,i+BATCH);
    await Promise.all(batch.map(async p=>{ try{ const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(p.nameES)}&langpair=es|pt-pt`); const j=await r.json(); p.namePT=j?.responseData?.translatedText||p.nameES; if(p.namePT.toUpperCase()===p.namePT||p.namePT.length<2) p.namePT=p.nameES; }catch{p.namePT=p.nameES;} }));
    btn.textContent=`A traduzir... ${Math.min(i+BATCH,products.length)}/${products.length}`;
    await sleep(300);
  }
  cState.products=products; cState.variantGroups=[];
  crRenderReview(); btn.textContent='Ver Produtos →'; btn.disabled=false;
}

function crRenderReview() {
  const el=document.getElementById('cr-step-review'); el.style.display='block';
  document.getElementById('cr-step-mapping').style.display='none';
  const products=cState.products;
  el.innerHTML=`
    <div class="card" style="margin-bottom:14px;padding:14px 18px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">

        </div>

    </div>

      <div style="max-height:460px;overflow-y:auto">

            <th style="width:36px"><input type="checkbox" id="cr-chk-all" onchange="crSelectAll(this.checked)" checked></th>
            <th style="width:60px">Img</th><th>Nome PT <span style="color:var(--blue);font-weight:400;font-size:10px">editável</span></th>
            <th>SKU</th><th>Preço</th><th>Stock</th><th>Marca</th>

      <button class="btn btn-ghost" onclick="crReset()">↩ Recomeçar</button>
      <button class="btn btn-primary" onclick="crCreate()">✚ Criar no Shopify</button>

}

function crProductRow(p,i) {
  return `<tr id="cr-row-${i}" style="${!p.selected?'opacity:0.45':''}">
    <td><input type="checkbox" class="cr-chk" data-idx="${i}" ${p.selected?'checked':''} onchange="crToggle(${i},this.checked)"></td>
    <td>${p.imageUrl?`<img src="${p.imageUrl}" style="width:44px;height:44px;object-fit:contain;border-radius:6px;border:1px solid var(--border);background:white" onerror="this.style.display='none'">`:'<div style="width:44px;height:44px;background:var(--panel);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px">?</div>'}</td>
    <td style="min-width:180px"><input type="text" value="${p.namePT}" id="cr-name-${i}" style="flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--surface)" onchange="cState.products[${i}].namePT=this.value"></td>
    <td class="mono" style="font-size:11px;color:var(--text2)">${p.sku||'—'}</td>
    <td class="mono" style="font-size:12px"><input type="number" value="${p.price}" step="0.01" min="0" style="width:72px;padding:4px 6px;font-size:12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;background:var(--surface)" onchange="cState.products[${i}].price=parseFloat(this.value).toFixed(2)"></td>
    <td class="mono" style="font-size:12px">${p.stock}</td>
    <td style="font-size:12px;color:var(--text2)">${p.brand||'—'}</td>
  </tr>`;
}

function crFilterTable() {
  const search=(document.getElementById('cr-search')?.value||'').toLowerCase();
  cState.products.forEach((p,i)=>{ const row=document.getElementById('cr-row-'+i); if(!row) return; row.style.display=(!search||(p.namePT+p.nameES+p.sku).toLowerCase().includes(search))?'':'none'; });
}
function crToggle(idx,checked) { cState.products[idx].selected=checked; const row=document.getElementById('cr-row-'+idx); if(row) row.style.opacity=checked?'1':'0.45'; crUpdateSummary(); }
function crSelectAll(checked) { cState.products.forEach((p,i)=>{p.selected=checked; const row=document.getElementById('cr-row-'+i); if(row){row.style.opacity=checked?'1':'0.45'; const chk=row.querySelector('.cr-chk'); if(chk)chk.checked=checked;}}); const ca=document.getElementById('cr-chk-all'); if(ca) ca.checked=checked; crUpdateSummary(); }
function crUpdateSummary() { const el=document.getElementById('cr-summary'); if(!el) return; el.textContent=`${cState.products.filter(p=>p.selected).length} produto(s) selecionado(s)`; }
function crReset() { cState={rows:[],colMap:{},products:[],variantGroups:[],step:'upload'}; create(); }

async function crCreate() {
  const toCreate=cState.products.filter(p=>p.selected);
  if(!toCreate.length){toast('Nenhum produto selecionado','error');return;}
  if(!state.settings.shop||!state.settings.token){toast('Configura a ligação Shopify primeiro','error');return;}
  document.getElementById('cr-step-review').style.display='none';
  document.getElementById('cr-step-progress').style.display='block';
  const log=(msg)=>{const el=document.getElementById('cr-log');if(el){el.innerHTML+=msg+'<br>';el.scrollTop=el.scrollHeight;}};
  const setProg=(p)=>{const el=document.getElementById('cr-progress');if(el)el.style.width=p+'%';};
  let created=0, errors=0;
  log(`🚀 A criar ${toCreate.length} produto(s)...`);
  for(let i=0;i<toCreate.length;i++){
    const p=toCreate[i];
    const name=document.getElementById('cr-name-'+p._idx)?.value||p.namePT||p.nameES;
    const price=document.getElementById(`cr-row-${p._idx}`)?.querySelector('input[type=number]')?.value||p.price;
    try{
      const data=await shopifyGQL(`mutation($input:ProductInput!,$media:[CreateMediaInput!]){productCreate(input:$input,media:$media){product{id variants(first:1){edges{node{id inventoryItem{id}}}}}userErrors{message}}}`,
        {input:{title:name,vendor:p.brand||undefined,productType:p.category||undefined,status:'DRAFT'},media:p.imageUrl?[{originalSource:p.imageUrl,mediaContentType:'IMAGE',alt:name}]:undefined});
      if(data.productCreate.userErrors.length) throw new Error(data.productCreate.userErrors[0].message);
      const product=data.productCreate.product;
      const variantId=product?.variants?.edges[0]?.node?.id;
      const invId=product?.variants?.edges[0]?.node?.inventoryItem?.id;
      if(product?.id&&variantId) await shopifyGQL(`mutation($productId:ID!,$variants:[ProductVariantsBulkInput!]!){productVariantsBulkUpdate(productId:$productId,variants:$variants){userErrors{message}}}`,{productId:product.id,variants:[{id:variantId,price:String(price),barcode:p.barcode||undefined}]});
      if(invId&&p.sku) await updateVariantSKU(invId,p.sku);
      // Apply tags (no supplier selected in create flow — mark as sem-origem until assigned)
      if(product?.id) await updateProductTags(product.id, ['cat:atualizado', `last-seen:${YYYYMM()}`]);
      log(`✅ ${name.substring(0,55)}`); created++;
    }catch(e){ log(`❌ ${name.substring(0,40)}: ${e.message}`); errors++; }
    setProg(Math.round((i+1)/toCreate.length*100));
    await sleep(400);
  }
  setProg(100);
  log(`<br>🎉 <strong>Concluído! ${created} produto(s) criado(s) como Rascunho${errors>0?' · '+errors+' erro(s)':''}</strong>`);
  toast(`${created} produto(s) criado(s)`,'success');
  fetchShopifyProducts();
}

          <div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--text2)">
            <div style="display:flex;align-items:center;gap:8px"><span class="tag-pill tp-sup">sup:&lt;fornecedor&gt;</span> Fornecedor responsável pelo produto</div>
            <div style="display:flex;align-items:center;gap:8px"><span class="tag-pill tp-ok">cat:atualizado</span> Produto visto neste upload</div>
            <div style="display:flex;align-items:center;gap:8px"><span class="tag-pill tp-warn">cat:em-vigilancia</span> Ausente 1 a N-1 uploads</div>
            <div style="display:flex;align-items:center;gap:8px"><span class="tag-pill tp-crit">cat:critico</span> Ausente N+ uploads — stock zerado</div>
            <div style="display:flex;align-items:center;gap:8px"><span class="tag-pill tp-purple">cat:sem-origem</span> Sem fornecedor associado</div>
            <div style="display:flex;align-items:center;gap:8px"><span class="tag-pill tp-gray">last-seen:AAAA-MM</span> Data da última atualização</div>
          </div>
          <div style="margin-top:14px">
            <button class="btn btn-purple btn-sm" onclick="detectNoOriginProducts()">🔍 Analisar produtos sem origem agora</button>
          </div>
        </div>
      </div>
      <div style="margin-bottom:24px">
        <div class="settings-label">Dados Locais</div>
        <div class="card">
          <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Todos os dados guardados localmente. Token Shopify nunca enviado para o GitHub.</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Exportar Backup</button>
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-input').click()">⬆ Importar Backup</button>
            <button class="btn btn-danger btn-sm" onclick="clearData()">🗑 Limpar Tudo</button>
          </div>
          <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(this.files[0])">
        </div>
      </div>
      <div style="margin-bottom:24px">
        <div class="settings-label">Sincronização Cloud (Supabase)</div>
        <div class="card">
          <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Dados guardados na cloud — nunca perdes informação ao mudar de dispositivo ou limpar o browser.</p>
          <div class="form-grid">
            <div class="form-group"><label>Supabase URL</label><input type="text" id="cfg-supa-url" value="${state.settings.supabaseUrl||''}" placeholder="https://xxxx.supabase.co"></div>
            <div class="form-group"><label>Anon Key</label><input type="password" id="cfg-supa-key" value="${state.settings.supabaseKey||''}" placeholder="eyJ..."></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-primary btn-sm" onclick="saveSettingsCloud()">Guardar</button>
              <button class="btn btn-ghost btn-sm" onclick="testCloudConn()">Testar Ligação</button>
              <button class="btn btn-blue btn-sm" onclick="syncNow()">⬇ Carregar da Cloud</button>
              <button class="btn btn-ghost btn-sm" onclick="saveToCloud().then(()=>toast('Enviado para a cloud','success'))">⬆ Enviar para Cloud</button>
            </div>
            <div id="cloud-result" style="font-size:13px"></div>
          </div>
        </div>
      </div>
      <div>
        <div class="settings-label">Proxy Cloudflare</div>
        <div class="card">
          <p style="color:var(--text2);font-size:13px">Worker ativo: <strong style="color:var(--blue)">shopify-proxy.victoraurich11.workers.dev</strong></p>
        </div>
      </div>
    </div>`;
}

function saveSettings() {
  state.settings = { ...state.settings, shop:document.getElementById('cfg-shop')?.value.trim(), token:document.getElementById('cfg-token')?.value.trim(), apiVersion:document.getElementById('cfg-version')?.value };
  save(); updateBadges(); toast('Configurações guardadas','success');
}
function saveSettingsCloud() {
  state.settings = { ...state.settings, supabaseUrl:document.getElementById('cfg-supa-url')?.value.trim(), supabaseKey:document.getElementById('cfg-supa-key')?.value.trim() };
  save(); toast('Configuração cloud guardada','success');
}
async function testConn() { saveSettings(); document.getElementById('conn-result').textContent='A testar...'; const r=await testConnection(); document.getElementById('conn-result').innerHTML=r.ok?`<span style="color:var(--green)">✓ Ligado a: ${r.name}</span>`:`<span style="color:var(--red)">✕ ${r.error}</span>`; }

function exportData() {
  const data={suppliers:state.suppliers,alerts:state.alerts,uploadHistory:state.uploadHistory,skuHealth:state.skuHealth,matches:state.matches};
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download=`beestore-v3-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function importData(file) {
  const r=new FileReader();
  r.onload=e=>{ try{ const d=JSON.parse(e.target.result); if(d.suppliers)state.suppliers=d.suppliers; if(d.alerts)state.alerts=d.alerts; if(d.uploadHistory)state.uploadHistory=d.uploadHistory; if(d.skuHealth)state.skuHealth=d.skuHealth; if(d.matches)state.matches=d.matches; save(); render(); toast('Backup importado','success'); }catch{toast('Ficheiro inválido','error');} };
  r.readAsText(file);
}

function clearData() {
  if(!confirm('Apagar todos os dados locais?')) return;
  ['suppliers','alerts','uploadHistory','skuHealth','matches','shopifyProducts','costHistory','costAlerts'].forEach(k=>{const empty=k==='skuHealth'||k==='costHistory'?{}:[]; DB.set(k,empty); state[k]=empty;});
  render(); toast('Dados apagados','info');
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function openModal(){ document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(e){ if(!e||e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); }
function toast(msg,type='info'){
  const el=document.createElement('div'); el.className=`toast-item ${type}`;
  const icons={success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
  el.innerHTML=`<span>${icons[type]||'ℹ'}</span><span>${msg}</span>`;
  document.getElementById('toast').appendChild(el); setTimeout(()=>el.remove(),4500);
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function timeAgo(d){ const m=Math.floor((Date.now()-new Date(d))/60000); const h=Math.floor(m/60); const dy=Math.floor(h/24); return dy>0?dy+'d':h>0?h+'h':m>0?m+'min':'agora'; }

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(async () => {
  // Carrega dados da cloud antes de renderizar (se Supabase configurado)
  const loaded = await loadFromCloud();
  if (loaded) toast('Dados carregados da cloud ☁','success');
  navigate('dashboard');
})();
</script>
</body>
</html>
