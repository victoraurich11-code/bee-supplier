<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeeStore — Supplier Manager v3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #F4F6FA; --surface: #FFFFFF; --panel: #F0F2F7; --border: #E2E6EF; --border2: #CDD3E0;
  --yellow: #D4A800; --yellow-bg: #FFF8E1; --yellow-border: #FFD54F;
  --blue: #1B6FE8; --blue-bg: #EBF3FF;
  --green: #16A34A; --green-bg: #F0FDF4;
  --red: #DC2626; --red-bg: #FEF2F2;
  --orange: #D97706; --orange-bg: #FFFBEB;
  --purple: #7C3AED; --purple-bg: #F5F3FF;
  --text: #1A1F2E; --text2: #5A6480; --text3: #9BA3B8;
  --sidebar-bg: #1A1F2E; --sidebar-text: #C8CDD8; --sidebar-active: #F5C400;
  --radius: 10px; --shadow: 0 1px 8px rgba(0,0,0,0.08); --shadow-lg: 0 4px 24px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; min-height: 100vh; }

/* LAYOUT */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; min-width: 220px; background: var(--sidebar-bg); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
.main { margin-left: 220px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* SIDEBAR */
.logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text span:first-child { color: #F5C400; }
.logo-text span:last-child { color: #8892A4; font-weight: 600; }
.logo-sub { font-size: 10px; color: #4A5268; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; font-family: 'DM Mono', monospace; }
.logo-version { font-size: 9px; color: #F5C400; opacity: 0.6; font-family: 'DM Mono', monospace; margin-top: 2px; }
.nav { padding: 14px 10px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--sidebar-text); transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
.nav-item.active { background: rgba(245,196,0,0.15); color: var(--sidebar-active); }
.nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.nav-badge.yellow { background: #D4A800; }
.sidebar-footer { padding: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.connection-status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #4A5268; font-family: 'DM Mono', monospace; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #4A5268; flex-shrink: 0; }
.dot.ok { background: #22C55E; box-shadow: 0 0 6px #22C55E; }
.dot.err { background: var(--red); }

/* TOPBAR */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 16px; position: sticky; top: 0; z-index: 40; box-shadow: var(--shadow); }
.page-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: none; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #F5C400; color: #1A1F2E; }
.btn-primary:hover:not(:disabled) { background: #e6b800; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(245,196,0,0.3); }
.btn-ghost { background: var(--panel); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
.btn-danger:hover:not(:disabled) { background: var(--red); color: white; }
.btn-success { background: var(--green-bg); color: var(--green); border: 1px solid #BBF7D0; }
.btn-success:hover:not(:disabled) { background: var(--green); color: white; }
.btn-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid #BFDBFE; }
.btn-blue:hover:not(:disabled) { background: var(--blue); color: white; }
.btn-orange { background: var(--orange-bg); color: var(--orange); border: 1px solid #FDE68A; }
.btn-orange:hover:not(:disabled) { background: var(--orange); color: white; }
.btn-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid #DDD6FE; }
.btn-purple:hover:not(:disabled) { background: var(--purple); color: white; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

/* CONTENT */
.content { padding: 24px 28px; flex: 1; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.card-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
.stat-card.c-yellow { border-left: 3px solid #F5C400; background: var(--yellow-bg); }
.stat-card.c-red { border-left: 3px solid var(--red); background: var(--red-bg); }
.stat-card.c-orange { border-left: 3px solid var(--orange); background: var(--orange-bg); }
.stat-card.c-purple { border-left: 3px solid var(--purple); background: var(--purple-bg); }
.stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1; color: var(--text); }
.stat-card.c-yellow .stat-num { color: var(--yellow); }
.stat-card.c-red .stat-num { color: var(--red); }
.stat-card.c-orange .stat-num { color: var(--orange); }
.stat-card.c-purple .stat-num { color: var(--purple); }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--surface); flex-wrap: wrap; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--panel); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFBFD; }
.mono { font-family: 'DM Mono', monospace; font-size: 12px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid #BBF7D0; }
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
.badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid #BFDBFE; }
.badge-orange { background: var(--orange-bg); color: var(--orange); border: 1px solid #FDE68A; }
.badge-gray { background: var(--panel); color: var(--text2); border: 1px solid var(--border); }
.badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid #DDD6FE; }

/* TAG PILLS */
.tag-pill { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; white-space: nowrap; margin: 1px; }
.tp-sup { background: var(--blue-bg); color: var(--blue); border: 1px solid #BFDBFE; }
.tp-ok { background: var(--green-bg); color: var(--green); border: 1px solid #BBF7D0; }
.tp-warn { background: var(--orange-bg); color: var(--orange); border: 1px solid #FDE68A; }
.tp-crit { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
.tp-gray { background: var(--panel); color: var(--text2); border: 1px solid var(--border); }
.tp-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid #DDD6FE; }

/* FORMS */
.form-grid { display: flex; flex-direction: column; gap: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text2); }
input[type=text], input[type=number], input[type=password], select, textarea { background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 9px 12px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,111,232,0.1); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; transform: translateY(12px); transition: transform 0.2s; box-shadow: var(--shadow-lg); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); }

/* UPLOAD */
.upload-zone { border: 2px dashed var(--border2); border-radius: 10px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--panel); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--blue); background: var(--blue-bg); }
.upload-zone .up-icon { font-size: 36px; margin-bottom: 10px; }
.upload-zone p { color: var(--text2); font-size: 13px; }
.upload-zone strong { color: var(--blue); }

/* PROGRESS */
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #22C55E); border-radius: 3px; transition: width 0.4s ease; }

/* PROGRESS SCREEN ANIMATIONS */
@keyframes pulse-icon { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:0.8} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
#prog-icon { animation: pulse-icon 1.8s ease-in-out infinite; display:inline-block; }
#prog-success { animation: fadeInUp 0.4s ease; }
.prog-summary-card { animation: fadeInUp 0.3s ease both; }

/* TABS */
.tabs { display: flex; gap: 2px; background: var(--panel); padding: 4px; border-radius: 10px; width: fit-content; margin-bottom: 18px; border: 1px solid var(--border); }
.tab { padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all 0.15s; border: none; background: none; }
.tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); font-weight: 600; }

/* ALERT CARDS */
.alert-list { display: flex; flex-direction: column; gap: 10px; }
.alert-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; box-shadow: var(--shadow); }
.alert-card.new_product { border-left: 3px solid var(--green); }
.alert-card.no_update { border-left: 3px solid var(--orange); }
.alert-card.zero_stock { border-left: 3px solid var(--red); }
.alert-card.no_origin { border-left: 3px solid var(--purple); }
.alert-icon { font-size: 20px; flex-shrink: 0; }
.alert-body { flex: 1; }
.alert-title { font-weight: 600; font-size: 13px; color: var(--text); }
.alert-desc { font-size: 12px; color: var(--text2); margin-top: 3px; }
.alert-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 50px 20px; color: var(--text3); }
.empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* REVIEW TABLE */
.review-section { margin-bottom: 20px; }
.review-section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 8px 8px 0 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.rs-found .review-section-title { background: var(--green-bg); color: var(--green); border: 1px solid #BBF7D0; border-bottom: none; }
.rs-new .review-section-title { background: var(--blue-bg); color: var(--blue); border: 1px solid #BFDBFE; border-bottom: none; }
.rs-missing .review-section-title { background: var(--orange-bg); color: var(--orange); border: 1px solid #FDE68A; border-bottom: none; }
.rs-found .table-wrap { border-top: none; border-radius: 0 0 10px 10px; border-color: #BBF7D0; }
.rs-new .table-wrap { border-top: none; border-radius: 0 0 10px 10px; border-color: #BFDBFE; }
.rs-missing .table-wrap { border-top: none; border-radius: 0 0 10px 10px; border-color: #FDE68A; }

/* HEALTH DASHBOARD */
.health-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.health-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.15s; }
.health-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.health-card.hc-ok { border-left: 3px solid var(--green); }
.health-card.hc-warn { border-left: 3px solid var(--orange); }
.health-card.hc-crit { border-left: 3px solid var(--red); }
.health-card.hc-unknown { border-left: 3px solid var(--purple); }

/* COVERAGE BAR */
.coverage-bar { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.coverage-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; display: flex; justify-content: space-between; }
.coverage-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.coverage-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

/* COL MAPPER */
.col-mapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media(max-width:700px) { .col-mapper { grid-template-columns: 1fr 1fr; } }

/* CHECKBOX */
input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }

/* TOAST */
#toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); animation: slideIn 0.2s ease; min-width: 280px; max-width: 380px; }
.toast-item.success { border-left: 3px solid var(--green); }
.toast-item.error { border-left: 3px solid var(--red); }
.toast-item.info { border-left: 3px solid var(--blue); }
.toast-item.warning { border-left: 3px solid var(--orange); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* SETTINGS */
.settings-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

/* ZERO CONFIRM MODAL */
.zero-product-row { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--red-bg); border-radius: 8px; border: 1px solid #FECACA; margin-bottom: 8px; }
.zero-product-row .zpr-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.zero-product-row .zpr-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.zero-product-row .zpr-stock { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--orange); font-weight: 600; white-space: nowrap; }

::-webkit-scrollbar { width: 5px; }
@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.7} }
.progress-fill.animating { animation: pulse-bar 1.2s ease-in-out infinite; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text"><span>Bee</span><span>Store</span></div>
      <div class="logo-sub">Supplier Manager</div>
      <div class="logo-version">v3.0 — Tags + Health</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"><span class="icon">⬡</span> Dashboard</div>
      <div class="nav-item" onclick="navigate('suppliers')" id="nav-suppliers"><span class="icon">🏭</span> Fornecedores</div>
      <div class="nav-item" onclick="navigate('upload')" id="nav-upload"><span class="icon">⬆</span> Processar Ficheiro</div>
      <div class="nav-item" onclick="navigate('health')" id="nav-health"><span class="icon">🩺</span> Saúde do Catálogo <span class="nav-badge yellow" id="health-badge" style="display:none">0</span></div>
      <div class="nav-item" onclick="navigate('alerts')" id="nav-alerts"><span class="icon">🔔</span> Alertas <span class="nav-badge" id="alert-badge" style="display:none">0</span></div>
      <div class="nav-item" onclick="navigate('matching')" id="nav-matching"><span class="icon">🔗</span> Matching</div>
      <div class="nav-item" onclick="navigate('create')" id="nav-create"><span class="icon">✚</span> Criar Produtos</div>
      <div class="nav-item" onclick="navigate('settings')" id="nav-settings"><span class="icon">⚙</span> Configurações</div>
    </nav>
    <div class="sidebar-footer">
      <div class="connection-status">
        <div class="dot" id="conn-dot"></div>
        <span id="conn-text">Não ligado</span>
      </div>
      <div class="connection-status" style="margin-top:6px">
        <div class="dot" id="cloud-dot"></div>
        <span id="cloud-text">Cloud —</span>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════
const DB = {
  get: (k, d=null) => { try { const v=localStorage.getItem('bsm3_'+k); return v?JSON.parse(v):d; } catch { return d; } },
  set: (k,v) => { try { localStorage.setItem('bsm3_'+k, JSON.stringify(v)); } catch(e) { console.warn('localStorage cheio, não foi possível guardar "'+k+'":', e.message); } },
};

const DEFAULT_SETTINGS = {
  shop:'', token:'', apiVersion:'2026-01',
  supabaseUrl:'https://zbsuyzeeuychzzcmgsyl.supabase.co',
  supabaseKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpic3V5emVldXljaHp6Y21nc3lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODg2NzYsImV4cCI6MjA5MTI2NDY3Nn0.IwW9PHuUhklZOkLOH6ktCxBhcQbFUMjQkXHg8o1hAfA'
};

let state = {
  page: 'dashboard',
  suppliers: DB.get('suppliers', []),
  alerts: DB.get('alerts', []),
  uploadHistory: DB.get('uploadHistory', []),
  skuHealth: DB.get('skuHealth', {}), // { [sku]: { suppId, suppName, missedUploads, lastSeen, productId, variantId, invItemId, title } }
  matches: DB.get('matches', []),
  shopifyProducts: DB.get('shopifyProducts', []),
  settings: { ...DEFAULT_SETTINGS, ...DB.get('settings', {}) },
  costHistory: DB.get('costHistory', {}),  // { [suppId::sku]: { custo, data } }
  costAlerts: DB.get('costAlerts', []),     // alertas de variação de custo (modo manual)
  parsedRows: [], uploadSuppId: null, colMap: {}, analysisResult: null,
};

function save() {
  // Dados críticos guardados primeiro — nunca devem ser perdidos
  ['suppliers','alerts','uploadHistory','skuHealth','matches','settings','costHistory','costAlerts'].forEach(k => DB.set(k, state[k]));
  // Cache Shopify: pode ser grande (>5MB) e causar quota exceeded.
  // Guardado por último e de forma isolada para não bloquear os dados críticos acima.
  try {
    localStorage.setItem('bsm3_shopifyProducts', JSON.stringify(state.shopifyProducts));
  } catch(e) {
    // Quota excedida: limpa o cache para libertar espaço; o utilizador só precisa de re-sincronizar
    localStorage.removeItem('bsm3_shopifyProducts');
    console.warn('Cache Shopify removido (localStorage cheio). Re-sincroniza os produtos.', e.message);
  }
  // Cloud sync em background — não bloqueia a UI
  saveToCloud().catch(e => console.warn('Cloud sync falhou:', e));
}

// ═══════════════════════════════════════════
// SUPABASE CLOUD SYNC
// ═══════════════════════════════════════════
let _cloudSyncing = false;

async function cloudUpsert(key, value) {
  const { supabaseUrl, supabaseKey } = state.settings;
  if (!supabaseUrl || !supabaseKey) return;
  const res = await fetch(`${supabaseUrl}/rest/v1/bee_data`, {
    method: 'POST',
    headers: {
      'apikey': supabaseKey,
      'Authorization': `Bearer ${supabaseKey}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
  if (!res.ok) throw new Error(`cloudUpsert ${key}: ${res.status}`);
}

async function saveToCloud() {
  const { supabaseUrl, supabaseKey } = state.settings;
  if (!supabaseUrl || !supabaseKey) return;
  if (_cloudSyncing) return;
  _cloudSyncing = true;
  try {
    const keys = ['suppliers','alerts','uploadHistory','skuHealth','matches','settings','costHistory','costAlerts','shopifyProducts'];
    await Promise.allSettled(keys.map(k => cloudUpsert(k, state[k])));
    updateCloudStatus(true);
  } catch(e) {
    updateCloudStatus(false);
    throw e;
  } finally {
    _cloudSyncing = false;
  }
}

async function loadFromCloud() {
  const { supabaseUrl, supabaseKey } = state.settings;
  if (!supabaseUrl || !supabaseKey) return false;
  try {
    const res = await fetch(`${supabaseUrl}/rest/v1/bee_data?select=key,value`, {
      headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` }
    });
    if (!res.ok) return false;
    const rows = await res.json();
    if (!rows.length) return false;
    const map = Object.fromEntries(rows.map(r => [r.key, r.value]));
    const keys = ['suppliers','alerts','uploadHistory','skuHealth','matches','costHistory','costAlerts','shopifyProducts'];
    keys.forEach(k => { if (map[k] !== undefined) state[k] = map[k]; });
    // Restaura settings da cloud mas preserva as credenciais locais (supabase + shopify token)
    if (map.settings) {
      const keep = { supabaseUrl: state.settings.supabaseUrl, supabaseKey: state.settings.supabaseKey, token: state.settings.token };
      state.settings = { ...DEFAULT_SETTINGS, ...map.settings, ...keep };
    }
    // Persiste no localStorage para offline
    ['suppliers','alerts','uploadHistory','skuHealth','matches','settings','costHistory','costAlerts'].forEach(k => DB.set(k, state[k]));
    try { localStorage.setItem('bsm3_shopifyProducts', JSON.stringify(state.shopifyProducts)); } catch {}
    updateCloudStatus(true);
    return true;
  } catch(e) {
    console.warn('Cloud load falhou:', e);
    updateCloudStatus(false);
    return false;
  }
}

async function testCloudConn() {
  const { supabaseUrl, supabaseKey } = state.settings;
  const el = document.getElementById('cloud-result');
  if (!supabaseUrl || !supabaseKey) { if(el) el.innerHTML=`<span style="color:var(--red)">✕ Configura URL e Chave</span>`; return; }
  if(el) el.textContent = 'A testar...';
  try {

    else { if(el) el.innerHTML=`<span style="color:var(--red)">✕ Erro ${res.status}</span>`; }
  } catch(e) { if(el) el.innerHTML=`<span style="color:var(--red)">✕ ${e.message}</span>`; }
}

async function syncNow() {
  toast('A sincronizar com a cloud...','info');
  const ok = await loadFromCloud();
  if (ok) { render(); toast('Dados carregados da cloud','success'); }
  else toast('Erro ao sincronizar — verifica a ligação','error');
}

function updateCloudStatus(ok) {
  const dot = document.getElementById('cloud-dot');
  const txt = document.getElementById('cloud-text');
  if (!dot || !txt) return;
  dot.className = 'dot ' + (ok ? 'ok' : 'err');

}

// ═══════════════════════════════════════════
// PSYCHOLOGICAL PRICING
// ═══════════════════════════════════════════
function applyPriceRounding(price, mode) {
  if (!mode || mode === 'none') return price;
  if (mode === 'prestige') {
    if (price < 10) return Math.ceil(price);
    if (price < 50) return Math.round(price / 5) * 5;
    if (price < 200) return Math.round(price / 10) * 10;
    return Math.round(price / 50) * 50;
  }
  let ending = 0.99;
  if (mode === 'always90' || mode === 'charm90') ending = 0.90;
  if (mode === 'charm99' || mode === 'charm90') {
    // band: <10 → .90, 10-100 → ending, >100 → .95
    if (price < 10) ending = 0.90;
    else if (price > 100) ending = (mode === 'charm90') ? 0.90 : 0.95;
  }
  const base = Math.floor(price);
  const candidate = base + ending;
  return candidate >= price ? parseFloat(candidate.toFixed(2)) : parseFloat((base + 1 + ending).toFixed(2));
}

const PROXY = 'https://shopify-proxy.victoraurich11.workers.dev';

async function shopifyGQL(query, variables={}) {
  const { shop, token, apiVersion } = state.settings;
  if (!shop || !token) throw new Error('Configura a loja nas Configurações primeiro.');
  const resp = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'X-Shopify-Shop':shop, 'X-Shopify-Token':token, 'X-Shopify-Version':apiVersion },
    body: JSON.stringify({ query, variables }),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json = await resp.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

async function testConnection() {
  try { const d = await shopifyGQL(`{ shop { name } }`); return { ok:true, name:d.shop.name }; }
  catch(e) { return { ok:false, error:e.message }; }
}

async function fetchShopifyProducts() {
  toast('A carregar produtos do Shopify...','info');
  let products=[], cursor=null, hasNext=true;
  while(hasNext) {
    const q=`query($cursor:String){products(first:250,after:$cursor){pageInfo{hasNextPage endCursor}edges{node{id title vendor tags variants(first:5){edges{node{id sku barcode price inventoryQuantity inventoryItem{id}}}}}}}}`;
    const data = await shopifyGQL(q,{cursor});
    const page = data.products;
    products.push(...page.edges.map(e=>({
      id:e.node.id, title:e.node.title, vendor:e.node.vendor, tags:e.node.tags||[],
      variants:e.node.variants.edges.map(v=>({
        id:v.node.id, sku:v.node.sku, barcode:v.node.barcode,
        price:v.node.price, stock:v.node.inventoryQuantity,
        inventoryItemId:v.node.inventoryItem?.id,
      }))
    })));
    hasNext=page.pageInfo.hasNextPage; cursor=page.pageInfo.endCursor;
    if(products.length>8000) break;
  }
  state.shopifyProducts=products; save();
  toast(`${products.length} produtos carregados`,'success');
  return products;
}

async function getLocationId() {
  const d = await shopifyGQL(`{locations(first:1){edges{node{id}}}}`);
  return d.locations.edges[0]?.node.id;
}

async function updateVariantPrice(productId, variantId, price) {
  return shopifyGQL(`mutation($productId:ID!,$variants:[ProductVariantsBulkInput!]!){productVariantsBulkUpdate(productId:$productId,variants:$variants){productVariants{id price}userErrors{message}}}`,
    {productId, variants:[{id:variantId, price:String(price)}]});
}

async function updateVariantStock(inventoryItemId, locationId, newQty) {
  const { shop, token, apiVersion } = state.settings;
  const invItemNumId = inventoryItemId.replace('gid://shopify/InventoryItem/', '');
  const locationNumId = locationId.replace('gid://shopify/Location/', '');
  const resp = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'X-Shopify-Shop':shop, 'X-Shopify-Token':token, 'X-Shopify-Version':apiVersion, 'X-Rest-Path':`/admin/api/${apiVersion}/inventory_levels/set.json` },
    body: JSON.stringify({ location_id:parseInt(locationNumId), inventory_item_id:parseInt(invItemNumId), available:newQty })
  });
  if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return await resp.json();
}

async function updateVariantSKU(inventoryItemId, sku) {
  return shopifyGQL(`mutation($id:ID!,$input:InventoryItemInput!){inventoryItemUpdate(id:$id,input:$input){inventoryItem{id sku}userErrors{message}}}`,
    {id:inventoryItemId, input:{sku}});
}

// ── TAG MANAGEMENT ──────────────────────────────────────────
// Tag schema:
//   sup:<suppId>        → fornecedor responsável
//   cat:atualizado      → saudável
//   cat:em-vigilancia   → ausente 1-2 uploads
//   cat:critico         → ausente N+ uploads ou stock zerado
//   cat:sem-origem      → sem fornecedor conhecido
//   last-seen:AAAA-MM   → data da última atualização
//   bsm:zerado-auto     → stock zerado pelo sistema

const CAT_TAGS = ['cat:atualizado','cat:em-vigilancia','cat:critico','cat:sem-origem'];
const YYYYMM = () => new Date().toISOString().slice(0,7);

function buildTagUpdate(existingTags, newTags, removeTags=[]) {
  // Remove old cat: and specified tags, add new ones, keep everything else
  const filtered = existingTags.filter(t => !removeTags.includes(t) && !CAT_TAGS.some(ct => t === ct) && !t.startsWith('last-seen:') && !newTags.some(nt => {
    const prefix = nt.split(':')[0]+':';
    return t.startsWith(prefix) && prefix !== 'cat:' && prefix !== 'bsm:';
  }));
  return [...new Set([...filtered, ...newTags])];
}

async function updateProductTags(productId, newTagsArray) {
  return shopifyGQL(
    `mutation($input:ProductUpdateInput!){productUpdate(product:$input){product{id tags}userErrors{message}}}`,
    { input: { id: productId, tags: newTagsArray } }
  );
}

async function applyTagsToProduct(productId, existingTags, suppId, catTag, extraTags=[]) {
  const tagsToApply = [`sup:${suppId}`, catTag, `last-seen:${YYYYMM()}`, ...extraTags];
  const finalTags = buildTagUpdate(existingTags, tagsToApply);
  await updateProductTags(productId, finalTags);
}

async function applyZeroStockTag(productId, existingTags) {
  const finalTags = buildTagUpdate(existingTags, ['cat:critico', 'bsm:zerado-auto', `last-seen:${YYYYMM()}`]);
  await updateProductTags(productId, finalTags);
  return finalTags;
}

async function applyWatchTag(productId, existingTags, suppId, missedCount) {
  const catTag = missedCount >= (state.suppliers.find(s=>s.id===suppId)?.zeroThreshold||4) ? 'cat:critico' : 'cat:em-vigilancia';
  const missed = `bsm:ausente-${missedCount}`;
  const finalTags = buildTagUpdate(existingTags, [`sup:${suppId}`, catTag, missed], existingTags.filter(t=>t.startsWith('bsm:ausente-')));
  await updateProductTags(productId, finalTags);
  return finalTags;
}

// ═══════════════════════════════════════════
// POST-UPLOAD HEALTH CHECK
// Finds products tagged sup:<suppId> that were NOT in this upload
// ═══════════════════════════════════════════
async function runPostUploadHealthCheck(suppId, processedSkus) {
  const supp = state.suppliers.find(s=>s.id===suppId);
  if (!supp) return;

  const suppTag = `sup:${suppId}`;
  // Find all Shopify products with this supplier tag
  const taggedProducts = state.shopifyProducts.filter(p =>
    p.tags && p.tags.includes(suppTag)
  );

  if (!taggedProducts.length) return;

  // Find which ones were NOT in this upload
  const missing = taggedProducts.filter(p => {
    return !p.variants.some(v => {
      const sku = (v.sku||'').trim().toLowerCase();
      const bc = (v.barcode||'').trim();
      return (sku && processedSkus.skus.has(sku)) || (bc && processedSkus.barcodes.has(bc));
    });
  });

  if (!missing.length) {
    toast(`✓ Todos os produtos ${supp.name} foram atualizados neste upload`, 'success');
    return;
  }

  // Coverage check: if upload is suspiciously small, warn but don't auto-escalate
  const avgExpected = computeAvgUploadSize(suppId);
  const uploadSize = processedSkus.total;
  const coveragePct = avgExpected > 0 ? Math.round((uploadSize / avgExpected) * 100) : 100;

  if (coveragePct < 70 && avgExpected > 50) {
    toast(`⚠ Listagem ${supp.name} parece incompleta (${coveragePct}% da média histórica). Verificar antes de escalar alertas.`, 'warning');
    // Still update skuHealth counters but don't show zero-stock modal
    updateMissedCounters(missing, suppId, false);
    return;
  }

  // Update missed counters
  updateMissedCounters(missing, suppId, true);

  // Build list needing attention
  const toAlert = missing.map(p => {
    const health = state.skuHealth[p.variants[0]?.sku?.toLowerCase()] || {};
    const missed = (health.missedUploads||0);
    return { ...p, missed, v: p.variants[0] };
  });

  // Show confirmation modal
  showZeroConfirmModal(toAlert, suppId, supp.name, coveragePct);
}

function computeAvgUploadSize(suppId) {
  const hist = state.uploadHistory.filter(h=>h.supplierId===suppId).slice(0,5);
  if (!hist.length) return 0;
  return Math.round(hist.reduce((a,h)=>a+(h.total||0),0)/hist.length);
}

function updateMissedCounters(missingProducts, suppId, escalate) {
  missingProducts.forEach(p => {
    p.variants.forEach(v => {
      const key = (v.sku||v.barcode||p.id).toLowerCase();
      if (!state.skuHealth[key]) {
        state.skuHealth[key] = { suppId, suppName: state.suppliers.find(s=>s.id===suppId)?.name||suppId, missedUploads:0, lastSeen:null, productId:p.id, variantId:v.id, invItemId:v.inventoryItemId, title:p.title, sku:v.sku, currentStock:v.stock };
      }
      state.skuHealth[key].missedUploads = (state.skuHealth[key].missedUploads||0) + 1;
    });
  });
  save();
}

function showZeroConfirmModal(products, suppId, suppName, coveragePct) {
  const supp = state.suppliers.find(s=>s.id===suppId);
  const threshold = supp?.zeroThreshold||4;
  const readyToZero = products.filter(p=>(state.skuHealth[(p.variants[0]?.sku||'').toLowerCase()]?.missedUploads||1) >= threshold);
  const watchList = products.filter(p=>(state.skuHealth[(p.variants[0]?.sku||'').toLowerCase()]?.missedUploads||1) < threshold);

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">🩺 Verificação Pós-Upload: ${suppName}</div>
    <div class="modal-sub">${products.length} produto(s) com tag <span class="tag-pill tp-sup">sup:${suppId}</span> não apareceram neste upload. Cobertura: <strong>${coveragePct > 0 ? coveragePct+'%' : 'primeiro upload'}</strong></div>

    ${readyToZero.length > 0 ? `
    <div style="margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">
        🔴 ${readyToZero.length} produto(s) ausentes há ${threshold}+ uploads — proposta: zerar stock
      </div>
      <div style="max-height:200px;overflow-y:auto">
        ${readyToZero.map(p=>`
          <div class="zero-product-row">
            <input type="checkbox" class="chk-zero" data-id="${p.id}" data-varid="${p.variants[0]?.id}" data-invid="${p.variants[0]?.inventoryItemId}" data-title="${p.title.replace(/"/g,'&quot;')}" checked style="flex-shrink:0">
            <div class="zpr-title">${p.title}</div>
            <div class="zpr-stock">stock: ${p.variants[0]?.stock??'?'} → 0</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    ${watchList.length > 0 ? `
    <div style="margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">
        🟡 ${watchList.length} produto(s) em vigilância — tags atualizadas, stock mantido
      </div>
      <div style="max-height:160px;overflow-y:auto">
        ${watchList.map(p=>{
          const missed = state.skuHealth[(p.variants[0]?.sku||'').toLowerCase()]?.missedUploads||1;
          return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--orange-bg);border-radius:8px;border:1px solid #FDE68A;margin-bottom:6px">
            <span style="flex:1;font-size:13px;font-weight:500">${p.title}</span>
            <span class="tag-pill tp-warn">ausente: ${missed} upload(s)</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div style="background:var(--panel);border-radius:8px;padding:10px 12px;border:1px solid var(--border);font-size:12px;color:var(--text2)">
      ℹ As tags de saúde serão atualizadas automaticamente em todos os produtos acima, independente da decisão sobre o stock.
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="applyHealthTagsOnly('${suppId}',${JSON.stringify(products.map(p=>p.id))});closeModal()">Só atualizar tags</button>
      ${readyToZero.length > 0 ? `<button class="btn btn-danger" onclick="applyZeroAndTags('${suppId}')">🔴 Zerar selecionados + atualizar tags</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>`;
  openModal();
}

async function applyHealthTagsOnly(suppId, productIds) {
  const supp = state.suppliers.find(s=>s.id===suppId);
  let done = 0;
  for (const pid of productIds) {
    const p = state.shopifyProducts.find(x=>x.id===pid);
    if (!p) continue;
    const missed = state.skuHealth[(p.variants[0]?.sku||'').toLowerCase()]?.missedUploads||1;
    const threshold = supp?.zeroThreshold||4;
    const catTag = missed >= threshold ? 'cat:critico' : 'cat:em-vigilancia';
    try {
      const newTags = await applyWatchTag(p.id, p.tags||[], suppId, missed);
      p.tags = newTags; // atualiza cache local para saúde do catálogo refletir imediatamente
      done++;
    } catch(e) { console.warn('tag error', e); }
    await sleep(200);
  }
  toast(`Tags de saúde atualizadas em ${done} produto(s)`, 'success');
  addHealthAlerts(suppId, productIds);
  save();
  updateBadges();
}

async function applyZeroAndTags(suppId) {
  const checkboxes = document.querySelectorAll('.chk-zero:checked');
  if (!checkboxes.length) { toast('Nenhum produto selecionado','error'); return; }

  closeModal();
  const locationId = await getLocationId().catch(()=>null);
  let zeroed = 0, errors = 0;

  for (const chk of checkboxes) {
    const productId = chk.dataset.id;
    const variantId = chk.dataset.varid;
    const invId = chk.dataset.invid;
    const title = chk.dataset.title;
    try {
      if (locationId && invId) {
        await updateVariantStock(invId, locationId, 0);
      }
      const p = state.shopifyProducts.find(x=>x.id===productId);
      const newTags = await applyZeroStockTag(productId, p?.tags||[]);
      // Update local cache
      if (p) {
        p.variants.forEach(v => { if(v.id===variantId) v.stock=0; });
        p.tags = newTags; // atualiza tags locais para cat:critico aparecer na saúde do catálogo
      }
      zeroed++;
      toast(`Stock zerado: ${title.substring(0,40)}`, 'info');
    } catch(e) { errors++; toast(`Erro: ${title.substring(0,30)} — ${e.message}`, 'error'); }
    await sleep(400);
  }

  // Apply watch tags to remaining (unchecked) products
  const allIds = Array.from(document.querySelectorAll('.chk-zero')).map(c=>c.dataset.id);
  const uncheckedIds = Array.from(document.querySelectorAll('.chk-zero:not(:checked)')).map(c=>c.dataset.id);
  await applyHealthTagsOnly(suppId, uncheckedIds);

  // Add alerts
  addZeroStockAlerts(suppId, checkboxes);
  save();
  toast(`${zeroed} stock(s) zerado(s)${errors?' · '+errors+' erro(s)':''}`, zeroed>0?'success':'error');
  updateBadges();
}

function addZeroStockAlerts(suppId, checkboxes) {
  const supp = state.suppliers.find(s=>s.id===suppId);
  checkboxes.forEach(chk => {
    state.alerts.push({
      id:'alert_'+Date.now()+Math.random(), type:'zero_stock',
      title:'Stock zerado automaticamente',
      desc:`${chk.dataset.title} — ${supp?.name} — ausente em múltiplos uploads`,
      productId: chk.dataset.id, suppId, date: new Date().toISOString(), dismissed: false,
    });
  });
  save();
}

function addHealthAlerts(suppId, productIds) {
  const supp = state.suppliers.find(s=>s.id===suppId);
  productIds.forEach(pid => {
    const p = state.shopifyProducts.find(x=>x.id===pid);
    if (!p) return;
    const alreadyExists = state.alerts.some(a=>a.productId===pid&&!a.dismissed&&a.type==='no_update');
    if (!alreadyExists) {
      state.alerts.push({
        id:'alert_'+Date.now()+Math.random(), type:'no_update',
        title:'Produto sem atualização do fornecedor',
        desc:`${p.title} — ${supp?.name} — não apareceu no último upload`,
        productId: pid, suppId, date: new Date().toISOString(), dismissed: false,
      });
    }
  });
  save();
}

// Detect products with NO supplier tag at all
async function detectNoOriginProducts() {
  const knownSupTags = state.suppliers.map(s=>`sup:${s.id}`);
  const noOrigin = state.shopifyProducts.filter(p => {
    if (!p.tags) return true;
    return !knownSupTags.some(t => p.tags.includes(t));
  });

  if (!noOrigin.length) { toast('Todos os produtos têm fornecedor atribuído ✓', 'success'); return; }

  let tagged = 0;
  for (const p of noOrigin) {
    try {
      const finalTags = buildTagUpdate(p.tags||[], ['cat:sem-origem']);
      await updateProductTags(p.id, finalTags);
      // Update local cache
      p.tags = finalTags;
      // Add alert if not already there
      if (!state.alerts.some(a=>a.productId===p.id&&a.type==='no_origin'&&!a.dismissed)) {
        state.alerts.push({
          id:'alert_'+Date.now()+Math.random(), type:'no_origin',
          title:'Produto sem fornecedor conhecido',
          desc:`${p.title} — SKU: ${p.variants[0]?.sku||'—'} — não pertence a nenhum fornecedor ativo`,
          productId: p.id, date: new Date().toISOString(), dismissed: false,
        });
      }
      tagged++;
    } catch(e) { console.warn(e); }
    await sleep(200);
  }
  save(); updateBadges();
  toast(`${tagged} produto(s) marcados como sem origem`, tagged>0?'warning':'success');
}

function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const titles = { dashboard:'Dashboard', suppliers:'Fornecedores', upload:'Processar Ficheiro', health:'Saúde do Catálogo', alerts:'Alertas', matching:'Matching Inteligente', create:'Criar Produtos', settings:'Configurações' };
  document.getElementById('page-title').textContent = titles[page]||page;
  render();
}

function render() {
  ({ dashboard, suppliers, upload, health, alerts, matching, create, settings })[state.page]?.();
  updateBadges();
}

function updateBadges() {
  const ac = state.alerts.filter(a=>!a.dismissed).length;
  const ab = document.getElementById('alert-badge');
  if(ab){ ab.textContent=ac; ab.style.display=ac>0?'flex':'none'; }

  const hc = computeHealthCounts();
  const hb = document.getElementById('health-badge');
  if(hb){ const n=hc.warn+hc.crit+hc.unknown; hb.textContent=n; hb.style.display=n>0?'flex':'none'; }

  const d = document.getElementById('conn-dot'), t = document.getElementById('conn-text');
  if(state.settings.shop&&state.settings.token){ d.className='dot ok'; t.textContent=state.settings.shop.replace('.myshopify.com',''); }
  else{ d.className='dot err'; t.textContent='Não ligado'; }
}

function computeHealthCounts() {
  const ok=[], warn=[], crit=[], unknown=[], noTag=[];
  const knownSupTags = state.suppliers.map(s=>`sup:${s.id}`);
  state.shopifyProducts.forEach(p => {
    const tags = p.tags||[];
    const hasAnyCatTag = tags.some(t=>t.startsWith('cat:'));
    const hasAnySupTag = knownSupTags.some(t=>tags.includes(t));
    if(!hasAnyCatTag && !hasAnySupTag) { noTag.push(p); return; }
    if(tags.includes('cat:critico')||tags.includes('bsm:zerado-auto')) crit.push(p);
    else if(tags.includes('cat:em-vigilancia')) warn.push(p);
    else if(tags.includes('cat:sem-origem')) unknown.push(p);
    else if(tags.includes('cat:atualizado')) ok.push(p);
    else if(!hasAnyCatTag) noTag.push(p); // has sup: but no cat: yet
  });
  return { ok:ok.length, warn:warn.length, crit:crit.length, unknown:unknown.length, noTag:noTag.length,
           okList:ok, warnList:warn, critList:crit, unknownList:unknown, noTagList:noTag };
}

  window.bulkAssignSupplier = async () => {
    const suppId = document.getElementById('bulk-supplier')?.value;
    if(!suppId){ toast('Escolhe um fornecedor primeiro','error'); return; }
    document.querySelectorAll('.notag-sup-sel').forEach(sel=>{
      const row = document.getElementById('notag-row-'+sel.dataset.idx);
      if(row && row.style.display!=='none') sel.value = suppId;
    });
    toast('Fornecedor definido para todos os visíveis — clica "Aplicar todos"','info');
  };

  window.assignSupplierToProduct = async (productId, suppId, idx) => {
    if(!suppId){ toast('Escolhe um fornecedor','error'); return; }
    const p = state.shopifyProducts.find(x=>x.id===productId);
    if(!p) return;
    const btn = document.querySelector(`button[onclick*="'${productId}'"]`);
    if(btn){ btn.textContent='...'; btn.disabled=true; }
    try {
      if(suppId==='__none__') {
        toast('Marca o produto para remoção manualmente no Shopify','info');
        if(btn){ btn.textContent='✓ Atribuir'; btn.disabled=false; }
        return;
      }
      const newTags = buildTagUpdate(p.tags||[], [`sup:${suppId}`, 'cat:atualizado', `last-seen:${YYYYMM()}`]);
      await updateProductTags(productId, newTags);
      p.tags = newTags;
      const row = document.getElementById('notag-row-'+idx);
      if(row){ row.style.opacity='0.4'; row.style.textDecoration='line-through'; }
      toast(`✓ ${p.title.substring(0,40)} → sup:${suppId}`,'success');
      save();
    } catch(e){ toast('Erro: '+e.message,'error'); }
    if(btn){ btn.textContent='✓ Atribuir'; btn.disabled=false; }
  };

  window.applyAllNoTagAssignments = async () => {
    const checked = document.querySelectorAll('.chk-notag:checked');
    if(!checked.length){ toast('Nenhum produto selecionado','error'); return; }
    let done=0, skip=0;
    for(const chk of checked){
      const sel = document.querySelector(`.notag-sup-sel[data-id="${chk.dataset.id}"]`);
      const suppId = sel?.value;
      if(!suppId||suppId==='__none__'){ skip++; continue; }
      await window.assignSupplierToProduct(chk.dataset.id, suppId, chk.dataset.idx);
      await sleep(250);
      done++;
    }
    toast(`${done} produto(s) atribuídos${skip>0?' · '+skip+' sem fornecedor selecionado':''}`, done>0?'success':'info');
    setTimeout(()=>{ fetchShopifyProducts().then(render); }, 1500);
  };
}

function catBadge(catTag) {
  if (!catTag) return '<span class="badge badge-gray">sem estado</span>';
  if (catTag==='cat:atualizado') return '<span class="badge badge-green">✅ Atualizado</span>';
  if (catTag==='cat:em-vigilancia') return '<span class="badge badge-orange">⚠ Vigilância</span>';
  if (catTag==='cat:critico') return '<span class="badge badge-red">🔴 Crítico</span>';
  if (catTag==='cat:sem-origem') return '<span class="badge badge-purple">🔍 Sem Origem</span>';
  return `<span class="badge badge-gray">${catTag}</span>`;
}

  alerts.forEach(a => {
    if (!bySup[a.suppId]) bySup[a.suppId] = { suppName: a.suppName, alerts: [] };
    bySup[a.suppId].alerts.push(a);
  });
  return Object.entries(bySup).map(([sid, group]) => `
    <div class="card" style="margin-top:16px;border-left:4px solid var(--orange)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="flex:1">
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px">⚠ Variações de Custo — ${group.suppName}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">${group.alerts.length} produto(s) com custo alterado — revê e marca como tratado</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="dismissAllCostAlerts('${sid}')">✓ Marcar todos como tratados</button>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th></th><th>Produto</th><th>SKU</th><th>Custo Anterior</th><th>Custo Novo</th><th>Variação</th><th></th></tr></thead>
        <tbody>
          ${group.alerts.map(a=>`
          <tr>
            <td style="font-size:16px;width:28px;text-align:center">${a.direcao==='subiu'?'🔴':'🟢'}</td>
            <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.produto}</td>
            <td class="mono" style="font-size:11px">${a.sku||'—'}</td>
            <td class="mono">€${a.custoAnterior.toFixed(2)}</td>
            <td class="mono" style="font-weight:600;color:${a.direcao==='subiu'?'var(--red)':'var(--green)'}">€${a.custoNovo.toFixed(2)}</td>
            <td class="mono" style="color:${a.direcao==='subiu'?'var(--red)':'var(--green)'}">

function saveSupplier(id) {
  const name = document.getElementById('s-name').value.trim();
  if(!name){ toast('Nome obrigatório','error'); return; }
  // Generate stable tag-friendly ID from name if new
  const tagId = id || 'sup_'+name.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,12)+'_'+Date.now().toString(36);
  const data = {
    id: tagId, name,
    active: document.getElementById('s-active').value==='true',
    priceType: document.getElementById('s-pricetype').value,
    margin: parseFloat(document.getElementById('s-margin')?.value||7),
    rounding: document.getElementById('s-rounding').value,
    zeroThreshold: parseInt(document.getElementById('s-zerothreshold')?.value||4),
    colName: document.getElementById('s-colname').value.trim(),
    colSku: document.getElementById('s-colsku').value.trim(),
    colBarcode: document.getElementById('s-colbarcode').value.trim(),
    colStock: document.getElementById('s-colstock').value.trim(),
    colPrice: document.getElementById('s-colprice').value.trim(),
    colStatus: document.getElementById('s-colstatus').value.trim(),
    pricingMode: document.getElementById('s-pricingmode')?.value || 'automatico',
    lastUpload: id ? state.suppliers.find(s=>s.id===id)?.lastUpload : null,
  };
  if(id) state.suppliers = state.suppliers.map(s=>s.id===id?data:s);
  else state.suppliers.push(data);
  save(); closeModal(); render(); toast(id?'Fornecedor atualizado':'Fornecedor criado','success');
}

function deleteSupplier(id) {
  if(!confirm('Eliminar este fornecedor?')) return;
  state.suppliers = state.suppliers.filter(s=>s.id!==id);
  save(); render(); toast('Eliminado','info');
}

function handleDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag'); handleFile(e.dataTransfer.files[0]); }

function handleFile(file) {
  if(!file) return;
  const suppId = document.getElementById('upload-supplier')?.value;
  if(!suppId){ toast('Seleciona um fornecedor primeiro','error'); return; }
  const reader = new FileReader();
  reader.onload=(e)=>{
    const data=new Uint8Array(e.target.result);
    const wb=XLSX.read(data,{type:'array',raw:false,cellText:true,cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    Object.keys(ws).forEach(addr=>{ if(addr[0]==='!') return; const cell=ws[addr]; if(cell.t==='n'&&cell.w) cell.v=cell.w.replace(/\./g,'').replace(/,/g,'.')||cell.v; });
    const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
    if(!rows.length){ toast('Ficheiro sem dados','error'); return; }
    state.parsedRows=rows; state.uploadSuppId=suppId;
    showColMapper(rows, suppId);
  };
  reader.readAsArrayBuffer(file);
  document.getElementById('file-info').style.display='block';

// ═══════════════════════════════════════════
// STEP 2 — ANALYSIS (entry point for "Analisar Ficheiro" button)
// ═══════════════════════════════════════════
function runAnalysis() {
  if (!state.parsedRows.length) { toast('Nenhum ficheiro carregado', 'error'); return; }
  const supp = state.suppliers.find(s => s.id === state.uploadSuppId);
  if (!supp) { toast('Fornecedor não encontrado', 'error'); return; }

  const groups = detectDuplicates(state.parsedRows, state.colMap);

  function doAnalysis(decisions) {
    const { name: nc, sku: sc, barcode: bc, stock: stc, price: pc } = state.colMap;
    const isManual = supp.pricingMode === 'manual';

    // Apply duplicate merge decisions
    const skipIdxs = new Set();
    const extraRows = [];
    decisions.forEach(d => {
      if (d.decision === true) {
        d.items.forEach(x => skipIdxs.add(x.idx));
        const mergedStock = d.items.reduce((a, x) => a + x.stock, 0);
        const minCost = Math.min(...d.items.map(x => x.cost));
        extraRows.push({ [nc]: d.items[0].name, [sc]: d.items[0].sku, [bc]: d.items[0].barcode, [stc]: String(mergedStock), [pc]: String(minCost) });
        d.unselectedItems.forEach(x => {
          skipIdxs.add(x.idx);
          extraRows.push({ [nc]: x.name, [sc]: x.sku, [bc]: x.barcode, [stc]: String(x.stock), [pc]: String(x.cost) });
        });
      }
    });

    const effectiveRows = [
      ...state.parsedRows.filter((_, i) => !skipIdxs.has(i)),
      ...extraRows,
    ];

    // Build SKU/barcode lookup maps from cached Shopify products
    const skuMap = {}, barcodeMap = {};
    state.shopifyProducts.forEach(p => {
      p.variants.forEach(v => {
        if (v.sku) skuMap[v.sku.trim().toLowerCase()] = { product: p, variant: v };
        if (v.barcode) barcodeMap[v.barcode.trim()] = { product: p, variant: v };
      });
    });

    const found = [], notFound = [], isNew = [];
    const knownSkus = new Set(), knownBarcodes = new Set();

    effectiveRows.forEach(row => {
      const name = (row[nc] || '').trim();
      if (!name) return;
      const sku = (row[sc] || '').trim();
      const barcode = (row[bc] || '').trim();
      const stockVal = parseInt((row[stc] || '0').toString().replace(/[^0-9]/g, '')) || 0;
      const costRaw = parseFloat((row[pc] || '0').toString().replace(',', '.')) || 0;

      if (sku) knownSkus.add(sku.toLowerCase());
      if (barcode) knownBarcodes.add(barcode);

      const rawPrice = supp.priceType === 'pvp' ? costRaw : costRaw * (1 + (supp.margin || 0) / 100);
      const finalPrice = applyPriceRounding(rawPrice, supp.rounding);

      // Chave para histórico de custo (modo manual)
      const histKey = sku ? `${supp.id}::${sku.toLowerCase()}` : barcode ? `${supp.id}::bc::${barcode}` : null;

      let match = null, matchedBy = null;
      if (sku && skuMap[sku.toLowerCase()]) { match = skuMap[sku.toLowerCase()]; matchedBy = 'SKU'; }
      else if (barcode && barcodeMap[barcode]) { match = barcodeMap[barcode]; matchedBy = 'BARCODE'; }

      if (match) {
        const currentShopifyPrice = parseFloat(match.variant.price) || 0;
        // Modo manual: finalPrice = preço atual Shopify (sem alteração por defeito)
        const effectiveFinalPrice = isManual ? currentShopifyPrice : finalPrice;
        const effectiveRawPrice   = isManual ? currentShopifyPrice : rawPrice;

        // Variação de custo vs histórico (modo manual, ignorar < €0.10)
        let costChange = null;
        if (isManual && histKey) {
          const hist = state.costHistory[histKey];
          const custoAnterior = hist ? hist.custo : null;
          if (custoAnterior !== null) {
            const variacaoEuros = costRaw - custoAnterior;
            if (Math.abs(variacaoEuros) >= 0.10) {
              costChange = {
                custoAnterior, custoNovo: costRaw,
                variacaoEuros,
                variacaoPercentagem: custoAnterior > 0 ? (variacaoEuros / custoAnterior) * 100 : 0,
                direcao: variacaoEuros > 0 ? 'subiu' : 'desceu',
                histKey,
              };
            }
          } else {
            // Primeiro upload — sem histórico ainda
            costChange = { direcao: 'novo', custoNovo: costRaw, histKey };
          }
        }

        const priceChanged = currentShopifyPrice.toFixed(2) !== effectiveFinalPrice.toFixed(2);
        const stockChanged = (match.variant.stock ?? 0) !== stockVal;
        const rowData = { name, sku, barcode, stockVal, costRaw, rawPrice: effectiveRawPrice, finalPrice: effectiveFinalPrice, suppId: supp.id, suppName: supp.name, histKey };
        found.push({
          ...rowData,
          shopifyProduct: match.product,
          shopifyVariant: match.variant,
          shopifyTitle: match.product.title,
          currentPrice: currentShopifyPrice,
          currentStock: match.variant.stock ?? 0,
          matchedBy,
          applyPrice: isManual ? false : priceChanged, // manual: false por defeito, ativado ao editar com ✏
          applyStock: stockChanged,
          _selected: true,
          costChange,
        });
      } else if (sku || barcode) {
        isNew.push({ name, sku, barcode, stockVal, costRaw, rawPrice, finalPrice, suppId: supp.id, suppName: supp.name, histKey });
      } else {
        notFound.push({ name, sku, barcode, stockVal, costRaw, rawPrice, finalPrice, suppId: supp.id, suppName: supp.name, histKey });
      }
    });

    // Extrair variações de custo para persistência posterior
    const costChanges = found.filter(p => p.costChange).map(p => ({
      ...p.costChange,
      name: p.name, sku: p.sku, barcode: p.barcode,
      suppId: supp.id, suppName: supp.name,
    }));

    state.analysisResult = {
      found, isNew,
      knownSkus, knownBarcodes,
      uploadTotal: effectiveRows.filter(r => (r[nc] || '').trim()).length,
      costChanges,
      isManual,
    };
    renderAnalysis(found, notFound, isNew, supp);
  }

  if (groups.length > 0) {
    showDuplicateStep(groups, doAnalysis);
  } else {
    doAnalysis([]);
  }
}


// ═══════════════════════════════════════════
// STEP 2.5 — DUPLICATE DETECTION & MERGE
// ═══════════════════════════════════════════
function nameSimilarity(a, b) {
  a = a.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
  b = b.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
  if (a === b) return 100;
  const wa = new Set(a.split(/\s+/).filter(w=>w.length>2));
  const wb = new Set(b.split(/\s+/).filter(w=>w.length>2));
  let common = 0; wa.forEach(w=>{ if(wb.has(w)) common++; });
  return Math.round((common / Math.max(wa.size, wb.size, 1)) * 100);
}

function detectDuplicates(rows, colMap) {
  const nc=colMap.name, sc=colMap.sku, bc=colMap.barcode, stc=colMap.stock, pc=colMap.price;
  const items = rows.map((row,i)=>({
    idx: i,
    name: (row[nc]||'').trim(),
    sku:  (row[sc]||'').trim(),
    barcode: (row[bc]||'').trim(),
    stock: parseInt((row[stc]||'0').replace(/[^0-9]/g,''))||0,
    cost:  parseFloat((row[pc]||'0').replace(',','.'))||0,
    merged: false,
  })).filter(x=>x.name);

  const groups = [];
  const used = new Set();

  if (items.length <= 400) {
    // Catálogo pequeno: comparação O(n²) completa
    for (let i=0; i<items.length; i++) {
      if (used.has(i)) continue;
      const a = items[i];
      const cluster = [a];
      for (let j=i+1; j<items.length; j++) {
        if (used.has(j)) continue;
        const b = items[j];
        const score = nameSimilarity(a.name, b.name);
        if (score < 88) continue;
        const maxCost = Math.max(a.cost, b.cost);
        if (maxCost > 0 && Math.abs(a.cost - b.cost) / maxCost > 0.15) continue;
        cluster.push(b);
        used.add(j);
      }
      if (cluster.length > 1) {
        used.add(i);
        groups.push({ items: cluster, score: nameSimilarity(cluster[0].name, cluster[1].name), decision: null });
      }
    }
  } else {
    // Catálogo grande: índice por palavra para evitar O(n²)
    const wordBuckets = new Map();
    items.forEach((item, i) => {
      const words = item.name.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w=>w.length>3);
      words.slice(0, 2).forEach(w => {
        if (!wordBuckets.has(w)) wordBuckets.set(w, []);
        wordBuckets.get(w).push(i);
      });
    });

    const checkedPairs = new Set();
    wordBuckets.forEach(indices => {
      // Ignora buckets com palavra demasiado comum (>40 produtos)
      if (indices.length < 2 || indices.length > 40) return;
      for (let a=0; a<indices.length; a++) {
        const ai = indices[a];
        if (used.has(ai)) continue;
        const itemA = items[ai];
        const cluster = [itemA];
        for (let b=a+1; b<indices.length; b++) {
          const bi = indices[b];
          if (used.has(bi)) continue;
          const pairKey = ai<bi ? ai+','+bi : bi+','+ai;
          if (checkedPairs.has(pairKey)) continue;
          checkedPairs.add(pairKey);
          const itemB = items[bi];
          const score = nameSimilarity(itemA.name, itemB.name);
          if (score < 88) continue;
          const maxCost = Math.max(itemA.cost, itemB.cost);
          if (maxCost > 0 && Math.abs(itemA.cost - itemB.cost) / maxCost > 0.15) continue;
          cluster.push(itemB);
          used.add(bi);
        }
        if (cluster.length > 1) {
          used.add(ai);
          groups.push({ items: cluster, score: nameSimilarity(cluster[0].name, cluster[1].name), decision: null });
        }
      }
    });
  }

  return groups;
}

function showDuplicateStep(groups, onContinue) {
  const el = document.getElementById('step-duplicates');
  if (!el) return onContinue([]);
  el.style.display = 'block';
  document.getElementById('step-mapping').style.display = 'none';

  // Each group now allows granular selection — user picks which lines merge
  // State: groupSelections[gi] = Set of selected item indices within that group
  const groupSelections = groups.map(g => new Set(g.items.map((_,i)=>i))); // all selected by default
  const groupDecisions = groups.map(() => null); // null = undecided, true = merge sel, false = all separate

  function countDecided() { return groupDecisions.filter(d=>d!==null).length; }

  function renderCard(g, gi) {
    const dec = groupDecisions[gi];
    const sel = groupSelections[gi];
    const decided = dec !== null;
    const isMerge = dec === true;
    const borderColor = !decided ? 'var(--yellow-border)' : isMerge ? '#BBF7D0' : '#BFDBFE';
    const bgColor    = !decided ? 'var(--yellow-bg)'     : isMerge ? 'var(--green-bg)' : 'var(--blue-bg)';
    const selItems   = g.items.filter((_,i)=>sel.has(i));
    const mergedStock = selItems.reduce((a,x)=>a+x.stock,0);
    const minCost     = selItems.length ? Math.min(...selItems.map(x=>x.cost)) : 0;

    return `<div class="card" style="border-color:${borderColor};background:${bgColor};padding:0;overflow:hidden;margin-bottom:12px" id="dup-card-${gi}">
      <!-- HEADER -->
      <div style="padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid ${borderColor}">
        <span style="font-size:16px">🔀</span>
        <div style="flex:1;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)">
          Score: ${g.score}% similar · ${g.items.length} linhas detetadas
          ${decided ? `<strong style="margin-left:8px;color:${isMerge?'var(--green)':'var(--blue)'}">${isMerge?'✓ Merge':'✕ Separados'}</strong>` : ''}
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm ${isMerge?'btn-success':'btn-ghost'}" onclick="decideDup(${gi},true)">✓ Agrupar selecionados</button>
          <button class="btn btn-sm ${dec===false?'btn-blue':'btn-ghost'}" onclick="decideDup(${gi},false)">✕ Todos separados</button>
        </div>
      </div>
      <!-- LINES — each with checkbox -->
      <div style="display:flex;flex-direction:column">
        ${g.items.map((item,ii)=>{
          const checked = sel.has(ii);
          const dimmed = decided && !checked;
          return `<div style="display:flex;align-items:stretch;${ii<g.items.length-1?'border-bottom:1px solid '+borderColor:''}${dimmed?';opacity:0.45':''}">
            <div style="display:flex;align-items:center;padding:0 14px;border-right:1px solid ${borderColor}">
              <input type="checkbox" ${checked?'checked':''} onchange="toggleDupItem(${gi},${ii},this.checked)" style="width:16px;height:16px;accent-color:var(--blue)">
            </div>
            <div style="flex:1;padding:12px 16px">
              <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px">Linha ${ii+1}</div>
              <div style="font-weight:600;font-size:13px;margin-bottom:6px;line-height:1.3">${item.name}</div>
              <div style="display:flex;gap:16px;font-size:12px;flex-wrap:wrap">
                <span><span style="color:var(--text3)">SKU:</span> <span class="mono">${item.sku||'—'}</span></span>
                <span><span style="color:var(--text3)">Barcode:</span> <span class="mono">${item.barcode||'—'}</span></span>
                <span><span style="color:var(--text3)">Stock:</span> <strong style="color:var(--blue)">${item.stock}</strong></span>
                <span><span style="color:var(--text3)">Custo:</span> <strong>€${item.cost.toFixed(2)}</strong></span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <!-- MERGE PREVIEW -->
      ${isMerge && selItems.length >= 2 ? `
      <div style="padding:9px 16px;background:rgba(22,163,74,0.08);border-top:1px solid #BBF7D0;display:flex;gap:16px;font-size:12px;flex-wrap:wrap">
        <span style="color:var(--text2)">Resultado:</span>
        <span><strong style="color:var(--blue)">Stock: ${mergedStock}</strong> (${selItems.map(x=>x.stock).join('+')})</span>
        <span><strong style="color:var(--green)">Custo base: €${minCost.toFixed(2)}</strong></span>
        <span style="color:var(--text3)">SKU: ${selItems[0].sku||'—'}</span>
        ${selItems.length < g.items.length ? `<span style="color:var(--orange)">⚠ ${g.items.length-selItems.length} linha(s) tratadas separadamente</span>` : ''}
      </div>` : ''}
    </div>`;
  }

  function renderAll() {
    el.innerHTML = `
      <div class="card" style="margin-bottom:14px;background:var(--yellow-bg);border-color:var(--yellow-border);padding:14px 18px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:24px">🔀</span>
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px">${groups.length} possível(eis) duplicado(s) detetado(s)</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Seleciona quais linhas são o mesmo produto. Só avança quando decidires todos.</div>
          </div>
          <div style="margin-left:auto;display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="decideAllDups(true)">✓ Todos iguais</button>
            <button class="btn btn-ghost btn-sm" onclick="decideAllDups(false)">✕ Todos diferentes</button>
          </div>
        </div>
      </div>
      <div id="dup-cards">${groups.map((g,gi)=>renderCard(g,gi)).join('')}</div>
      <div class="card" style="display:flex;align-items:center;gap:14px;position:sticky;bottom:0;z-index:10;padding:12px 18px">
        <div style="flex:1;font-size:13px;color:var(--text2)" id="dup-status">${countDecided()} de ${groups.length} decidido(s)</div>
        <button class="btn btn-ghost" onclick="resetUpload()">↩ Cancelar</button>
        <button class="btn btn-primary" id="btn-dup-continue" onclick="continuePastDuplicates()" ${countDecided()<groups.length?'disabled':''}>Continuar →</button>
      </div>`;
  }

  function refreshCard(gi) {
    const card = document.getElementById('dup-card-'+gi);
    if(card) card.outerHTML = renderCard(groups[gi], gi);
    document.getElementById('dup-status').textContent = `${countDecided()} de ${groups.length} decidido(s)`;
    const btn = document.getElementById('btn-dup-continue');
    if(btn) btn.disabled = countDecided() < groups.length;
  }

  window.toggleDupItem = (gi, ii, checked) => {
    if(checked) groupSelections[gi].add(ii);
    else groupSelections[gi].delete(ii);
    // Re-render just this card
    const oldCard = document.getElementById('dup-card-'+gi);
    if(oldCard) { const tmp=document.createElement('div'); tmp.innerHTML=renderCard(groups[gi],gi); oldCard.replaceWith(tmp.firstChild); }
  };

  window.decideDup = (gi, isMerge) => {
    groupDecisions[gi] = isMerge;
    const oldCard = document.getElementById('dup-card-'+gi);
    if(oldCard) { const tmp=document.createElement('div'); tmp.innerHTML=renderCard(groups[gi],gi); oldCard.replaceWith(tmp.firstChild); }
    document.getElementById('dup-status').textContent = `${countDecided()} de ${groups.length} decidido(s)`;
    const btn = document.getElementById('btn-dup-continue');
    if(btn) btn.disabled = countDecided() < groups.length;
  };

  window.decideAllDups = (isMerge) => {
    groups.forEach((_,gi) => groupDecisions[gi] = isMerge);
    document.getElementById('dup-cards').innerHTML = groups.map((g,gi)=>renderCard(g,gi)).join('');
    document.getElementById('dup-status').textContent = `${groups.length} de ${groups.length} decidido(s)`;
    const btn = document.getElementById('btn-dup-continue');
    if(btn) btn.disabled = false;
  };

  window.continuePastDuplicates = () => {
    el.style.display = 'none';
    // Build decisions array compatible with runAnalysisWithDecisions
    const decisions = groups.map((g,gi) => ({
      ...g,
      decision: groupDecisions[gi],
      // Only merge the selected items
      items: groupDecisions[gi] === true
        ? g.items.filter((_,ii) => groupSelections[gi].has(ii))
        : g.items,
      unselectedItems: groupDecisions[gi] === true
        ? g.items.filter((_,ii) => !groupSelections[gi].has(ii))
        : [],
    }));
    onContinue(decisions);
  };

  renderAll();
}
